<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>С днём рождения, Лизонька! 💕</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffd0dd, #ffb6c1, #ff9eb5, #ff85a5, #ffb6d9);
            background-size: 400% 400%;
            animation: gradientBG 8s ease infinite;
            font-family: 'Caveat', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 0%; }
            25% { background-position: 50% 50%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 50% 50%; }
            100% { background-position: 0% 0%; }
        }
        .title {
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            text-align: center;
            font-family: 'Pacifico', cursive;
            font-size: clamp(2.5rem, 10vw, 4rem);
            color: #b34180;
            text-shadow: 2px 2px 0 #ffb6c1, 4px 4px 10px rgba(255, 105, 180, 0.4);
            z-index: 10;
            pointer-events: none;
            animation: glow 3s ease-in-out infinite;
            padding: 0 10px;
        }
        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 2px #ff9eb5); }
            50% { filter: drop-shadow(0 0 15px #ff4080); }
        }
        .subtitle {
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-size: clamp(1.5rem, 6vw, 2.2rem);
            color: #d44e8c;
            opacity: 0.9;
            font-family: 'Caveat', cursive;
            z-index: 10;
            pointer-events: none;
            transform: rotate(-5deg);
            background: rgba(255,255,240,0.4);
            padding: 0.2rem 1rem;
            border-radius: 50px;
            backdrop-filter: blur(4px);
        }
        .hint {
            position: absolute;
            bottom: 15px;
            left: 20px;
            background: rgba(255, 240, 245, 0.7);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            color: #a53f6c;
            box-shadow: 0 4px 10px rgba(255, 105, 180, 0.3);
            border: 1px solid #ffa0c5;
            z-index: 10;
            font-family: 'Caveat', cursive;
            pointer-events: none;
            white-space: nowrap;
        }
        .hint span {
            display: inline-block;
            animation: bounce 1.2s infinite;
        }
        @keyframes bounce {
            0%,100%{ transform: translateY(0); }
            50%{ transform: translateY(-5px); }
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            touch-action: none;
        }
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            color: #b34180;
            z-index: 20;
            background: rgba(255,255,255,0.5);
            padding: 1rem 2rem;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <h1 class="title">✨ Лизонька, с днём рождения! ✨</h1>
    <div class="subtitle">Ты самое прекрасное, что есть 💗</div>
    <div class="hint"><span>👉</span> коснись любой картинки — станет сердечком <span>👈</span></div>
    <div class="loader" id="loader">✨ Загружаем сюрприз... ✨</div>
    <canvas id="birthdayCanvas"></canvas>

    <script>
        (function() {
            const canvas = document.getElementById('birthdayCanvas');
            const ctx = canvas.getContext('2d');
            const loader = document.getElementById('loader');

            let width, height;
            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // ==================== 20 ПОЖЕЛАНИЙ ====================
            const wishes = [
                "Счастья 💖", "Радости ☀️", "Улыбок 😊", "Тепла 🔥",
                "Любви 💕", "Вдохновения ✨", "Успехов 🚀", "Побед 🏆",
                "Путешествий ✈️", "Открытий 🌍", "Друзей 👯", "Весны 🌸",
                "Нежности 💗", "Заботы 🤗", "Исполнения мечт 🌠", "Волшебства 🪄",
                "Гармонии 🕊️", "Света 🌟", "Добра 🕯️", "Бесконечного счастья ♾️"
            ];

            // ==================== КАРТИНКИ ИЗ ПАПКИ /icons ====================
            // ВНИМАНИЕ: замените имена файлов на те, которые вы загрузили в папку icons
            const imagesData = [
                // 3 сердечка
                { type: 'heart', url: 'icons/heart1.png', fallback: '❤️', size: 90 },
                { type: 'heart', url: 'icons/heart2.png', fallback: '💖', size: 95 },
                { type: 'heart', url: 'icons/heart3.png', fallback: '💗', size: 85 },

                // 3 цветка
                { type: 'flower', url: 'icons/flower1.png', fallback: '🌸', size: 90 },
                { type: 'flower', url: 'icons/flower2.png', fallback: '🌼', size: 95 },
                { type: 'flower', url: 'icons/flower3.png', fallback: '🌺', size: 85 },

                // 3 кота
                { type: 'cat', url: 'icons/cat1.png', fallback: '🐱', size: 100 },
                { type: 'cat', url: 'icons/cat2.png', fallback: '😻', size: 105 },
                { type: 'cat', url: 'icons/cat3.png', fallback: '🐈', size: 95 },

                // 3 вкусняшки
                { type: 'yummy', url: 'icons/yummy1.png', fallback: '🍰', size: 100 },
                { type: 'yummy', url: 'icons/yummy2.png', fallback: '🧁', size: 90 },
                { type: 'yummy', url: 'icons/yummy3.png', fallback: '🍭', size: 85 },

                // 3 подарка
                { type: 'gift', url: 'icons/gift1.png', fallback: '🎁', size: 95 },
                { type: 'gift', url: 'icons/gift2.png', fallback: '🎀', size: 90 },
                { type: 'gift', url: 'icons/gift3.png', fallback: '🎁', size: 100 },

                // 3 трусиков
                { type: 'panties', url: 'icons/panties1.png', fallback: '🩲', size: 90 },
                { type: 'panties', url: 'icons/panties2.png', fallback: '🩲', size: 95 },
                { type: 'panties', url: 'icons/panties3.png', fallback: '🩲', size: 85 }
            ];

            // ==================== ПРЕДЗАГРУЗКА С ОТЛАДКОЙ ====================
            console.log('Начинаем загрузку изображений...');
            const preloadPromises = imagesData.map(item => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = item.url;
                    img.onload = () => {
                        console.log(`✅ Загружено: ${item.url}`);
                        item.img = img;
                        item.loaded = true;
                        resolve(true);
                    };
                    img.onerror = () => {
                        console.warn(`❌ Ошибка загрузки: ${item.url} — используется эмодзи ${item.fallback}`);
                        item.loaded = false;
                        resolve(false);
                    };
                });
            });

            const timeoutPromise = new Promise(resolve => setTimeout(resolve, 3000));
            Promise.all([...preloadPromises, timeoutPromise]).then(() => {
                console.log('Загрузка завершена. Неудачные заменены эмодзи.');
                loader.style.display = 'none';
                startAnimation();
            });

            // Собираем все элементы: картинки + текстовые пожелания
            const itemsData = [
                ...imagesData,
                ...wishes.map(text => ({
                    type: 'text',
                    content: text,
                    color: ['#d43f8c', '#b34180', '#c71585', '#d1629e', '#d83d7a', '#e667af'][Math.floor(Math.random() * 6)],
                    size: 42 + Math.random() * 8,
                    font: Math.random() > 0.5 ? 'Caveat' : 'Pacifico'
                }))
            ];

            // ==================== СОЗДАНИЕ ЛЕТАЮЩИХ ЭЛЕМЕНТОВ ====================
            let elements = [];

            function createRandomElement() {
                const data = itemsData[Math.floor(Math.random() * itemsData.length)];
                const speedFactor = 2.5;
                const el = {
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * speedFactor,
                    vy: (Math.random() - 0.5) * speedFactor,
                    type: data.type,
                    size: (data.size || 80) * (0.8 + Math.random() * 0.6),
                    rotation: (Math.random() - 0.5) * 0.2,
                };

                if (data.type === 'text') {
                    el.content = data.content;
                    el.color = data.color;
                    el.font = data.font;
                    el.isText = true;
                } else {
                    if (data.loaded && data.img) {
                        el.img = data.img;
                        el.isImage = true;
                    } else {
                        el.content = data.fallback;
                        el.color = '#ff69b4';
                        el.font = 'Caveat';
                        el.isText = true;
                        // Увеличим размер эмодзи-заменителя, чтобы было заметнее
                        el.size *= 1.2;
                    }
                }
                return el;
            }

            const count = Math.min(45, Math.floor(width * height / 15000));
            for (let i = 0; i < count; i++) {
                elements.push(createRandomElement());
            }

            // ==================== АНИМАЦИЯ ====================
            function draw() {
                ctx.clearRect(0, 0, width, height);
                
                for (let el of elements) {
                    ctx.save();
                    ctx.translate(el.x, el.y);
                    ctx.rotate(el.rotation);
                    
                    if (el.isImage && el.img) {
                        ctx.drawImage(el.img, -el.size/2, -el.size/2, el.size, el.size);
                    } else if (el.content) {
                        ctx.font = `${el.size}px '${el.font}', 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif`;
                        ctx.fillStyle = el.color;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.shadowColor = 'rgba(255, 105, 180, 0.5)';
                        ctx.shadowBlur = 15;
                        ctx.shadowOffsetX = 2;
                        ctx.shadowOffsetY = 2;
                        ctx.fillText(el.content, 0, 0);
                    }
                    
                    ctx.restore();
                }
                
                requestAnimationFrame(update);
            }

            function update() {
                const maxSpeed = 5.5;
                for (let el of elements) {
                    el.x += el.vx;
                    el.y += el.vy;

                    if (el.x < 0) { el.x = 0; el.vx *= -0.9; el.vy += (Math.random() - 0.5) * 0.2; }
                    if (el.x > width) { el.x = width; el.vx *= -0.9; el.vy += (Math.random() - 0.5) * 0.2; }
                    if (el.y < 0) { el.y = 0; el.vy *= -0.9; el.vx += (Math.random() - 0.5) * 0.2; }
                    if (el.y > height) { el.y = height; el.vy *= -0.9; el.vx += (Math.random() - 0.5) * 0.2; }

                    if (Math.random() < 0.005) {
                        el.vx += (Math.random() - 0.5) * 0.8;
                        el.vy += (Math.random() - 0.5) * 0.8;
                    }

                    if (Math.abs(el.vx) > maxSpeed) el.vx = Math.sign(el.vx) * maxSpeed;
                    if (Math.abs(el.vy) > maxSpeed) el.vy = Math.sign(el.vy) * maxSpeed;
                }
                
                draw();
            }

            function startAnimation() {
                requestAnimationFrame(update);
            }

            // ==================== ПРЕВРАЩЕНИЕ В СЕРДЕЧКО ====================
            function handleInteraction(e) {
                e.preventDefault();

                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;

                const mouseX = (clientX - rect.left) * scaleX;
                const mouseY = (clientY - rect.top) * scaleY;

                let closestDist = 150;
                let closestIndex = -1;

                for (let i = 0; i < elements.length; i++) {
                    const el = elements[i];
                    const radius = el.size * 0.7;
                    const dx = mouseX - el.x;
                    const dy = mouseY - el.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < radius && dist < closestDist) {
                        closestDist = dist;
                        closestIndex = i;
                    }
                }

                if (closestIndex !== -1) {
                    const heartData = imagesData.find(d => d.type === 'heart');
                    if (heartData) {
                        const newEl = elements[closestIndex];
                        if (heartData.loaded && heartData.img) {
                            newEl.isImage = true;
                            newEl.img = heartData.img;
                            newEl.isText = false;
                            newEl.content = null;
                        } else {
                            newEl.isText = true;
                            newEl.content = heartData.fallback || '❤️';
                            newEl.color = '#f06292';
                            newEl.font = 'Caveat';
                            newEl.isImage = false;
                        }
                        newEl.type = 'heart';
                        newEl.size *= 1.6;
                        setTimeout(() => {
                            newEl.size /= 1.6;
                        }, 150);
                    }
                }
            }

            canvas.addEventListener('click', handleInteraction);
            canvas.addEventListener('touchstart', handleInteraction, { passive: false });
            canvas.addEventListener('contextmenu', (e) => e.preventDefault());

            setInterval(() => {
                if (elements.length < 60) {
                    elements.push(createRandomElement());
                }
            }, 5000);
        })();
    </script>
</body>
</html>
