<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>С днём рождения, Лизонька! 💕</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffd0dd, #ffb6c1, #ff9eb5, #ff85a5, #ffb6d9);
            background-size: 400% 400%;
            animation: gradientBG 8s ease infinite;
            font-family: 'Caveat', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 0%; }
            25% { background-position: 50% 50%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 50% 50%; }
            100% { background-position: 0% 0%; }
        }
        .title {
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            text-align: center;
            font-family: 'Pacifico', cursive;
            font-size: clamp(2.5rem, 10vw, 4rem);
            color: #b34180;
            text-shadow: 2px 2px 0 #ffb6c1, 4px 4px 10px rgba(255, 105, 180, 0.4);
            z-index: 10;
            pointer-events: none;
            animation: glow 3s ease-in-out infinite;
            padding: 0 10px;
        }
        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 2px #ff9eb5); }
            50% { filter: drop-shadow(0 0 15px #ff4080); }
        }
        .subtitle {
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-size: clamp(1.5rem, 6vw, 2.2rem);
            color: #d44e8c;
            opacity: 0.9;
            font-family: 'Caveat', cursive;
            z-index: 10;
            pointer-events: none;
            transform: rotate(-5deg);
            background: rgba(255,255,240,0.4);
            padding: 0.2rem 1rem;
            border-radius: 50px;
            backdrop-filter: blur(4px);
        }
        .hint {
            position: absolute;
            bottom: 15px;
            left: 20px;
            background: rgba(255, 240, 245, 0.7);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            color: #a53f6c;
            box-shadow: 0 4px 10px rgba(255, 105, 180, 0.3);
            border: 1px solid #ffa0c5;
            z-index: 10;
            font-family: 'Caveat', cursive;
            pointer-events: none;
            white-space: nowrap;
        }
        .hint span {
            display: inline-block;
            animation: bounce 1.2s infinite;
        }
        @keyframes bounce {
            0%,100%{ transform: translateY(0); }
            50%{ transform: translateY(-5px); }
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            touch-action: none;
        }
    </style>
</head>
<body>
    <h1 class="title">Лизонька, с днём рождения!</h1>
    <div class="subtitle">Ты самое прекрасное, что есть 💗</div>
    <div class="hint"><span>👉</span> коснись любой картинки — станет сердечком <span>👈</span></div>
    <canvas id="birthdayCanvas"></canvas>

    <script>
        (function() {
            const canvas = document.getElementById('birthdayCanvas');
            const ctx = canvas.getContext('2d');

            let width, height;
            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // ==================== ВСЕ КАРТИНКИ ИЗ ПАПКИ ICONS ====================
            const imageFiles = [
                // 3 сердечка
                { type: 'heart', file: 'heart1.png', size: 90 },
                { type: 'heart', file: 'heart2.png', size: 95 },
                { type: 'heart', file: 'heart3.png', size: 85 },

                // 3 цветка
                { type: 'flower', file: 'flower1.png', size: 90 },
                { type: 'flower', file: 'flower2.png', size: 95 },
                { type: 'flower', file: 'flower3.png', size: 85 },

                // 3 кота
                { type: 'cat', file: 'cat1.png', size: 100 },
                { type: 'cat', file: 'cat2.png', size: 105 },
                { type: 'cat', file: 'cat3.png', size: 95 },

                // 3 вкусняшки
                { type: 'yummy', file: 'yummy1.png', size: 100 },
                { type: 'yummy', file: 'yummy2.png', size: 90 },
                { type: 'yummy', file: 'yummy3.png', size: 85 },

                // 3 подарка
                { type: 'gift', file: 'gift1.png', size: 95 },
                { type: 'gift', file: 'gift2.png', size: 90 },
                { type: 'gift', file: 'gift3.png', size: 100 },

                // 3 трусиков
                { type: 'panties', file: 'panties1.png', size: 90 },
                { type: 'panties', file: 'panties2.png', size: 95 },
                { type: 'panties', file: 'panties3.png', size: 85 }
            ];

            // Загружаем все изображения
            let loadedImages = [];
            let imagesToLoad = imageFiles.length;
            let loadedCount = 0;

            imageFiles.forEach((item) => {
                const img = new Image();
                img.src = `icons/${item.file}?v=5`; // версия 5 для сброса кэша
                img.onload = () => {
                    loadedImages.push({
                        img: img,
                        type: item.type,
                        baseSize: item.size
                    });
                    loadedCount++;
                    if (loadedCount === imagesToLoad) {
                        startAnimation();
                    }
                };
                img.onerror = () => {
                    console.warn(`Не загрузилась: ${item.file}`);
                    loadedCount++;
                    if (loadedCount === imagesToLoad) {
                        startAnimation(); // запускаем даже с неполным набором
                    }
                };
            });

            // ==================== ЛЕТАЮЩИЕ ЭЛЕМЕНТЫ ====================
            let elements = [];

            function createRandomElement() {
                if (loadedImages.length === 0) return null;
                const imgData = loadedImages[Math.floor(Math.random() * loadedImages.length)];
                const speedFactor = 2.5;
                return {
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * speedFactor,
                    vy: (Math.random() - 0.5) * speedFactor,
                    type: imgData.type,
                    img: imgData.img,
                    size: imgData.baseSize * (0.8 + Math.random() * 0.6),
                    rotation: (Math.random() - 0.5) * 0.2,
                };
            }

            function startAnimation() {
                const count = Math.min(40, Math.floor(width * height / 15000));
                for (let i = 0; i < count; i++) {
                    const el = createRandomElement();
                    if (el) elements.push(el);
                }
                requestAnimationFrame(update);
            }

            function draw() {
                ctx.clearRect(0, 0, width, height);
                for (let el of elements) {
                    ctx.save();
                    ctx.translate(el.x, el.y);
                    ctx.rotate(el.rotation);
                    ctx.drawImage(el.img, -el.size/2, -el.size/2, el.size, el.size);
                    ctx.restore();
                }
                requestAnimationFrame(update);
            }

            function update() {
                const maxSpeed = 5.5;
                for (let el of elements) {
                    el.x += el.vx;
                    el.y += el.vy;

                    if (el.x < 0) { el.x = 0; el.vx *= -0.9; el.vy += (Math.random() - 0.5) * 0.2; }
                    if (el.x > width) { el.x = width; el.vx *= -0.9; el.vy += (Math.random() - 0.5) * 0.2; }
                    if (el.y < 0) { el.y = 0; el.vy *= -0.9; el.vx += (Math.random() - 0.5) * 0.2; }
                    if (el.y > height) { el.y = height; el.vy *= -0.9; el.vx += (Math.random() - 0.5) * 0.2; }

                    if (Math.random() < 0.005) {
                        el.vx += (Math.random() - 0.5) * 0.8;
                        el.vy += (Math.random() - 0.5) * 0.8;
                    }

                    if (Math.abs(el.vx) > maxSpeed) el.vx = Math.sign(el.vx) * maxSpeed;
                    if (Math.abs(el.vy) > maxSpeed) el.vy = Math.sign(el.vy) * maxSpeed;
                }
                draw();
            }

            // ==================== ПРЕВРАЩЕНИЕ В СЕРДЕЧКО ====================
            function handleInteraction(e) {
                e.preventDefault();

                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;

                const mouseX = (clientX - rect.left) * scaleX;
                const mouseY = (clientY - rect.top) * scaleY;

                let closestDist = 150;
                let closestIndex = -1;

                for (let i = 0; i < elements.length; i++) {
                    const el = elements[i];
                    const radius = el.size * 0.7;
                    const dx = mouseX - el.x;
                    const dy = mouseY - el.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < radius && dist < closestDist) {
                        closestDist = dist;
                        closestIndex = i;
                    }
                }

                if (closestIndex !== -1) {
                    const heartImages = loadedImages.filter(img => img.type === 'heart');
                    if (heartImages.length > 0) {
                        const randomHeart = heartImages[Math.floor(Math.random() * heartImages.length)];
                        elements[closestIndex].img = randomHeart.img;
                        elements[closestIndex].type = 'heart';
                        elements[closestIndex].size *= 1.6;
                        setTimeout(() => {
                            elements[closestIndex].size /= 1.6;
                        }, 150);
                    }
                }
            }

            canvas.addEventListener('click', handleInteraction);
            canvas.addEventListener('touchstart', handleInteraction, { passive: false });
            canvas.addEventListener('contextmenu', (e) => e.preventDefault());

            // Периодически добавляем новые элементы
            setInterval(() => {
                if (elements.length < 60) {
                    const el = createRandomElement();
                    if (el) elements.push(el);
                }
            }, 5000);
        })();
    </script>
</body>
</html>
