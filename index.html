<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С днём рождения, Лиза!</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Caveat:wght@400..700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
    min-height:100vh;
    background:linear-gradient(145deg,#ffd0dd,#ffb6c1,#ff9eb5,#ff85a5,#ffb6d9);
    background-size:400% 400%;
    animation:gradientBG 10s ease infinite;
    font-family:'Caveat';
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}
@keyframes gradientBG{
    0%{background-position:0}
    50%{background-position:100%}
    100%{background-position:0}
}
.title{
    position:absolute;
    top:10px;
    width:100%;
    text-align:center;
    font-family:'Great Vibes';
    font-size:clamp(3rem,10vw,5rem);
    color:#8b1e5f;
    animation:glow 4s infinite;
    z-index:5;
}
@keyframes glow{
    0%,100%{filter:drop-shadow(0 0 3px #ff9eb5);}
    50%{filter:drop-shadow(0 0 8px #ff4080);}
}
.hint{
    position:absolute;
    bottom:15px;
    left:20px;
    background:rgba(255,240,245,.7);
    padding:.4rem .9rem;
    border-radius:40px;
    font-size:clamp(1.3rem,4vw,1.7rem);
    color:#a53f6c;
    z-index:5;
}
canvas{
    position:absolute;
    width:100vw;
    height:100vh;
}
</style>
</head>
<body>
<h1 class="title">С днём рождения, Лиза</h1>
<div class="hint">👉</div>
<canvas id="birthdayCanvas"></canvas>

<script>
(function(){
const canvas=document.getElementById("birthdayCanvas");
const ctx=canvas.getContext("2d");

let width,height,dpr;
function resize(){
    width=window.innerWidth;
    height=window.innerHeight;
    dpr=window.devicePixelRatio||1;
    canvas.width=width*dpr;
    canvas.height=height*dpr;
    canvas.style.width=width+"px";
    canvas.style.height=height+"px";
    ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener("resize",resize);
resize();

// ================== Фоновая музыка ==================
let bgMusic=null;
let bgGain=null;
let audioCtx=null;

// ================== ЗВУК ПОП ==================
function playPop(){
    try {
        new Audio('icons/pop.mp3').play().catch(()=>{});
    } catch(e){}
}

// ================== ЧАСТИЦЫ И ВСПЫШКИ ==================
let particles = [];
let waves = [];
let flashes = [];

function createParticles(x, y, count = 20) {
    for (let i = 0; i < count; i++) {
        let angle = Math.random() * 2 * Math.PI;
        let speed = 1.5 + Math.random() * 3;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 1,
            life: 1,
            size: 3 + Math.random() * 4,
            color: `rgba(255, 120, 180, ${0.8+Math.random()*0.2})`
        });
    }
    waves.push({ x, y, r: 8, life: 1 });
}

function createFlash(x, y) {
    flashes.push({ x, y, radius: 10, life: 1 });
}

function createCelebration() {
    for (let i = 0; i < 40; i++) {
        let angle = Math.random() * 2 * Math.PI;
        let speed = 2 + Math.random() * 5;
        particles.push({
            x: width / 2,
            y: height / 2,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 2,
            life: 1,
            size: 5 + Math.random() * 6,
            color: `rgba(255, ${100+Math.random()*100}, 150, 1)`
        });
    }
    waves.push({ x: width / 2, y: height / 2, r: 20, life: 1 });
}

// ================== ИЗОБРАЖЕНИЯ ==================
const imageFiles=[
    'cat1.png','cat2.png','cat3.png','cat4.png','cat5.png',
    'heart1.png','heart2.png','heart3.png',
    'flower1.png','flower2.png','flower3.png',
    'yummy1.png','yummy2.png','yummy3.png',
    'gift1.png','gift2.png','gift3.png',
    'panties1.png','panties2.png','panties3.png',
    'present1.png','present2.png','present3.png',
    'skel1.png','skel2.png','skel3.png'
];

let regularImages = [];
let skelImages = [];
let presentImages = [];
let imagePool = [];
let imageIndex = 0;
let loadedCount = 0;
let totalImages = imageFiles.length;

function shuffleImages(){
    if (regularImages.length === 0) {
        console.warn('Нет обычных изображений для создания пула');
        imagePool = [];
        return;
    }
    imagePool = [...regularImages];
    for(let i=imagePool.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [imagePool[i],imagePool[j]]=[imagePool[j],imagePool[i]];
    }
    imageIndex = 0;
}

function ready(){
    loadedCount++;
    if(loadedCount === totalImages){
        console.log('Все изображения обработаны. Обычных:', regularImages.length, 'Скелетиков:', skelImages.length, 'Подарков:', presentImages.length);
        shuffleImages();
        start();
    }
}

// Функция проверки, действительно ли изображение валидно
function isImageValid(img) {
    try {
        return img.complete && img.naturalWidth > 0 && img.naturalHeight > 0;
    } catch(e) {
        return false;
    }
}

// Загружаем каждое изображение с уникальным параметром для сброса кэша GitHub
imageFiles.forEach(f => {
    let img = new Image();
    // Добавляем случайный параметр, чтобы продавить кэш GitHub
    img.src = "icons/" + f + "?nocache=" + Date.now() + Math.random();
    img.crossOrigin = "anonymous"; // на всякий случай
    img.onload = () => {
        try {
            if (isImageValid(img)) {
                if (f.startsWith('skel')) {
                    skelImages.push(img);
                } else if (f.startsWith('present')) {
                    presentImages.push(img);
                } else {
                    regularImages.push(img);
                }
            } else {
                console.warn('Изображение загружено, но повреждено:', f);
            }
        } catch(e) {
            console.warn('Ошибка при обработке изображения:', f, e);
        }
        ready();
    };
    img.onerror = () => {
        console.warn('Ошибка загрузки:', f);
        ready(); // всё равно считаем, чтобы не блокировать
    };
});

// ================== ЭЛЕМЕНТЫ ==================
let elements = [];
let time = 0;
const wishes = ["Счастья","Любви","Нежности","Радости","Улыбок","Тепла","Мечты"];

// ================== СЧЁТЧИК КЛИКОВ ==================
let clickCount = 0;
let celebrationDone = false;

// ================== РУКА-УКАЗАТЕЛЬ ==================
let hand = null;
let firstClickDone = false;

function findCat1() {
    for (let i = 0; i < elements.length; i++) {
        let el = elements[i];
        if (el.type === 'img' && !el.fly && el.img && el.img.src && el.img.src.includes('cat1.png')) {
            return i;
        }
    }
    return -1;
}

function createHand() {
    if (firstClickDone) return;
    let idx = findCat1();
    if (idx !== -1) {
        hand = {
            targetIndex: idx,
            offsetX: -70,
            offsetY: -20,
            phase: Math.random() * Math.PI * 2,
            scale: 1,
        };
    }
}

function updateHand() {
    if (!hand || firstClickDone) return;
    let target = elements[hand.targetIndex];
    if (!target || target.fly || (target.type === 'img' && target.img && !target.img.src.includes('cat1.png'))) {
        let newIdx = findCat1();
        if (newIdx !== -1) {
            hand.targetIndex = newIdx;
        } else {
            hand = null;
        }
        return;
    }
    hand.phase += 0.05;
    hand.scale = 1 + Math.sin(hand.phase * 2) * 0.1;
}

// ================== СОЗДАНИЕ НОВОГО ЭЛЕМЕНТА ==================
function create(){
    let side=Math.floor(Math.random()*4);
    let x,y,m=120;
    if(side===0){x=-m;y=Math.random()*height;}
    if(side===1){x=width+m;y=Math.random()*height;}
    if(side===2){x=Math.random()*width;y=-m;}
    if(side===3){x=Math.random()*width;y=height+m;}
    let dx=width/2-x, dy=height/2-y;
    let len=Math.hypot(dx,dy);
    let speed = 0.5 + Math.random() * 1.2;
    let vx = (dx / len) * speed;
    let vy = (dy / len) * speed;

    if (Math.random() < 0.7 && regularImages.length > 0 && imagePool.length > 0) {
        let img = imagePool[imageIndex++];
        if(imageIndex >= imagePool.length) shuffleImages();
        return {
            type: 'img',
            img,
            x, y,
            vx: vx * 0.5,
            vy: vy * 0.5,
            size: 85 + Math.random() * 25,
            rot: Math.random(),
            rs: (Math.random() - 0.5) * 0.01,
            opacity: 0,
            phase: Math.random() * 6,
            fly: false
        };
    } else {
        return {
            type: 'text',
            text: wishes[Math.floor(Math.random() * wishes.length)],
            x, y,
            vx: vx * 0.5,
            vy: vy * 0.5,
            size: 45 + Math.random() * 15,
            rot: 0,
            rs: 0,
            opacity: 0,
            phase: Math.random() * 6,
            fly: false
        };
    }
}

// ================== СТАРТ ==================
function start(){
    const targetStartCount = Math.min(20, Math.floor(width * height / 18000));
    const addInterval = setInterval(() => {
        if (elements.length < targetStartCount) {
            for (let i = 0; i < 2; i++) {
                let el = create();
                if (el) elements.push(el);
            }
        } else {
            clearInterval(addInterval);
        }
    }, 250);

    setTimeout(() => { createHand(); }, 500);

    let checkInterval = setInterval(() => {
        if (!hand && !firstClickDone) {
            createHand();
        }
        if (firstClickDone) {
            clearInterval(checkInterval);
            hand = null;
        }
    }, 2000);

    loop();
}

// ================== ЦИКЛ ==================
function loop(){ 
    try {
        update(); 
        draw(); 
    } catch(e) {
        console.error('Ошибка в цикле:', e);
    }
    requestAnimationFrame(loop); 
}

// ================== ОБНОВЛЕНИЕ ==================
function update(){
    time += 0.1;
    let max = 2.0;

    for(let i=elements.length-1;i>=0;i--){
        try {
            let e=elements[i];
            e.x += e.vx;
            e.y += e.vy;
            if(!e.fly){ e.vx *= 1.002; e.vy *= 1.002; }
            e.vx *= 0.999;
            e.vy *= 0.999;
            if(e.vx > max) e.vx = max;
            if(e.vx < -max) e.vx = -max;
            if(e.vy > max) e.vy = max;
            if(e.vy < -max) e.vy = -max;
            e.rot += e.rs;
            if(e.opacity < 1) e.opacity += 0.02;

            if(e.fly){
                e.vy -= 0.1;
                e.vx *= 0.99;
                e.rot = 0;
                e.rs = 0;
            }

            if(e.fly && e.y < -200){ elements.splice(i,1); continue; }
            if(!e.fly){
                if(e.x < 0) e.x = width;
                if(e.x > width) e.x = 0;
                if(e.y < 0) e.y = height;
                if(e.y > height) e.y = 0;
            }
        } catch(e) {
            console.warn('Ошибка при обновлении элемента', e);
            elements.splice(i,1); // удаляем проблемный элемент
        }
    }

    for(let i=particles.length-1;i>=0;i--){
        let p=particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.04;
        p.life -= 0.02;
        p.size *= 0.97;
        if(p.life <= 0 || p.size < 1) particles.splice(i,1);
    }
    if(particles.length > 150) particles = particles.slice(-150);

    for(let i=waves.length-1;i>=0;i--){
        let w=waves[i];
        w.r += 5;
        w.life -= 0.03;
        if(w.life <= 0) waves.splice(i,1);
    }

    for(let i=flashes.length-1;i>=0;i--){
        let f=flashes[i];
        f.radius += 8;
        f.life -= 0.02;
        if(f.life <= 0) flashes.splice(i,1);
    }

    if(elements.length < 15) {
        let el = create();
        if (el) elements.push(el);
    }

    updateHand();
}

// ================== РИСОВАНИЕ ==================
function draw(){
    try {
        ctx.clearRect(0,0,width,height);
    } catch(e){}
    elements.forEach(e=>{
        try {
            ctx.save(); 
            ctx.globalAlpha=e.opacity; 
            ctx.translate(e.x,e.y); 
            ctx.rotate(e.rot);
            let scale=1+.25*Math.sin(time*.05+e.phase);
            let s=e.size*scale;
            if(e.type==='img') {
                if (e.img && isImageValid(e.img)) {
                    ctx.drawImage(e.img,-s/2,-s/2,s,s);
                }
            }
            else{
                ctx.font=s+"px Great Vibes";
                ctx.fillStyle="#ff4da6";
                ctx.textAlign="center";
                ctx.textBaseline="middle";
                ctx.fillText(e.text,0,0);
            }
            ctx.restore();
        } catch(e) {
            // если ошибка при рисовании, просто пропускаем элемент
            ctx.restore();
        }
    });

    if (hand && !firstClickDone) {
        try {
            let target = elements[hand.targetIndex];
            if (target && !target.fly) {
                ctx.save();
                ctx.globalAlpha = 0.9;
                ctx.translate(target.x + hand.offsetX, target.y + hand.offsetY);
                ctx.scale(hand.scale, hand.scale);
                ctx.font = "60px 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif";
                ctx.fillStyle = "#ff3388";
                ctx.shadowColor = "rgba(255, 20, 100, 0.5)";
                ctx.shadowBlur = 15;
                ctx.shadowOffsetX = 3;
                ctx.shadowOffsetY = 3;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("👉", 0, 0);
                ctx.restore();
            } else {
                createHand();
            }
        } catch(e){}
    }

    flashes.forEach(f=>{
        try {
            ctx.save();
            ctx.globalAlpha = f.life;
            ctx.beginPath();
            ctx.arc(f.x, f.y, f.radius, 0, 2*Math.PI);
            ctx.strokeStyle = "#ffb6c1";
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.restore();
        } catch(e){}
    });

    particles.forEach(p=>{
        try {
            ctx.save();
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, 2*Math.PI);
            ctx.fill();
            ctx.restore();
        } catch(e){}
    });

    waves.forEach(w=>{
        try {
            ctx.save();
            ctx.globalAlpha = w.life;
            ctx.beginPath();
            ctx.arc(w.x, w.y, w.r, 0, 2*Math.PI);
            ctx.strokeStyle = "#ff9eb5";
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.restore();
        } catch(e){}
    });
}

// ================== КЛИК ==================
canvas.addEventListener("click",e=>{
    try {
        if(!bgMusic){
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            bgMusic = new Audio('icons/q.mp3');
            const track = audioCtx.createMediaElementSource(bgMusic);
            bgGain = audioCtx.createGain();
            bgGain.gain.value=0;
            track.connect(bgGain).connect(audioCtx.destination);
            bgMusic.loop=true;
            bgMusic.play().then(()=>fadeInMusic()).catch(()=>{});
        }

        let rect=canvas.getBoundingClientRect();
        let x=e.clientX-rect.left, y=e.clientY-rect.top;
        let r2=40*40;
        let candidates=[];
        elements.forEach((el,i)=>{ 
            if(el.fly) return; 
            let dx=x-el.x, dy=y-el.y; 
            if(dx*dx+dy*dy<r2) candidates.push(i); 
        });

        if(candidates.length){
            if (!firstClickDone) {
                firstClickDone = true;
                hand = null;
            }

            playPop();
            createFlash(x, y);

            let id=candidates[Math.floor(Math.random()*candidates.length)];
            let el=elements[id];
            createParticles(el.x, el.y, 20);

            let newImg = null;
            // Определяем, подарок ли это
            if (el.type === 'img' && el.img && el.img.src && el.img.src.includes('gift')) {
                if (presentImages.length > 0) {
                    newImg = presentImages[Math.floor(Math.random() * presentImages.length)];
                } else {
                    console.warn('Нет present-изображений, используется скелетик');
                    if (skelImages.length > 0) {
                        newImg = skelImages[Math.floor(Math.random() * skelImages.length)];
                    }
                }
            } else {
                if (skelImages.length > 0) {
                    newImg = skelImages[Math.floor(Math.random() * skelImages.length)];
                }
            }

            if (newImg && isImageValid(newImg)) {
                el.type = 'img';
                el.img = newImg;
                el.fly = true;
                el.vy = -40 - Math.random() * 40;
                el.vx = (Math.random() - 0.5) * 1.5;
                el.size *= 1.25;
                setTimeout(() => { el.size /= 1.25; }, 150);
            } else {
                // Если нет валидного изображения, просто удаляем объект (улетает пустой)
                console.warn('Нет валидного изображения для превращения, объект удаляется');
                elements.splice(id, 1);
            }

            clickCount++;
            if (clickCount === 10 && !celebrationDone) {
                createCelebration();
                celebrationDone = true;
            }

            setTimeout(() => {
                let newEl = create();
                if (newEl) elements.push(newEl);
            }, 600);
        }
    } catch(e) {
        console.error('Ошибка при клике:', e);
    }
});

setInterval(()=>{
    try {
        if(elements.length<65) {
            let el = create();
            if (el) elements.push(el);
        }
    } catch(e){}
},4000);

function fadeInMusic(){
    if(bgGain){
        let target=3.5;
        let step=0.01;
        let interval=setInterval(()=>{
            try {
                if(bgGain.gain.value<target){
                    bgGain.gain.value=Math.min(bgGain.gain.value+step,target);
                } else clearInterval(interval);
            } catch(e){}
        },50);
    }
}
})();
</script>
</body>
  </html>
