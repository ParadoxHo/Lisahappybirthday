<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>С днём рождения, Лиза!</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Caveat:wght@400..700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffd0dd, #ffb6c1, #ff9eb5, #ff85a5, #ffb6d9);
            background-size: 400% 400%;
            animation: gradientBG 8s ease infinite;
            font-family: 'Caveat', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 0%; }
            25% { background-position: 50% 50%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 50% 50%; }
            100% { background-position: 0% 0%; }
        }
        .title {
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            text-align: center;
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3rem, 12vw, 5rem);
            color: #b34180;
            text-shadow: 2px 2px 0 #ffb6c1, 4px 4px 10px rgba(255, 105, 180, 0.4);
            z-index: 10;
            pointer-events: none;
            animation: glow 3s ease-in-out infinite;
            padding: 0 10px;
        }
        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 2px #ff9eb5); }
            50% { filter: drop-shadow(0 0 15px #ff4080); }
        }
        .subtitle {
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-size: clamp(1.5rem, 6vw, 2.2rem);
            color: #d44e8c;
            opacity: 0.9;
            font-family: 'Caveat', cursive;
            z-index: 10;
            pointer-events: none;
            transform: rotate(-5deg);
            background: rgba(255,255,240,0.4);
            padding: 0.2rem 1rem;
            border-radius: 50px;
            backdrop-filter: blur(4px);
        }
        .hint {
            position: absolute;
            bottom: 15px;
            left: 20px;
            background: rgba(255, 240, 245, 0.7);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            color: #a53f6c;
            box-shadow: 0 4px 10px rgba(255, 105, 180, 0.3);
            border: 1px solid #ffa0c5;
            z-index: 10;
            font-family: 'Caveat', cursive;
            pointer-events: none;
            white-space: nowrap;
        }
        .hint span {
            display: inline-block;
            animation: bounce 1.2s infinite;
        }
        @keyframes bounce {
            0%,100%{ transform: translateY(0); }
            50%{ transform: translateY(-5px); }
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            touch-action: none;
        }
    </style>
</head>
<body>
    <h1 class="title">С днём рождения, Лиза</h1>
    <div class="subtitle">Ты самое прекрасное, что есть 💗</div>
    <div class="hint"><span>👉</span> коснись любой картинки или пожелания — станет сердечком <span>👈</span></div>
    <canvas id="birthdayCanvas"></canvas>

    <script>
        (function() {
            const canvas = document.getElementById('birthdayCanvas');
            const ctx = canvas.getContext('2d');

            let width, height;
            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // ==================== КАРТИНКИ ИЗ ПАПКИ ICONS ====================
            const imageFiles = [
                { type: 'heart', file: 'heart1.png', size: 90 },
                { type: 'heart', file: 'heart2.png', size: 95 },
                { type: 'heart', file: 'heart3.png', size: 85 },
                { type: 'flower', file: 'flower1.png', size: 90 },
                { type: 'flower', file: 'flower2.png', size: 95 },
                { type: 'flower', file: 'flower3.png', size: 85 },
                { type: 'cat', file: 'cat1.png', size: 100 },
                { type: 'cat', file: 'cat2.png', size: 105 },
                { type: 'cat', file: 'cat3.png', size: 95 },
                { type: 'yummy', file: 'yummy1.png', size: 100 },
                { type: 'yummy', file: 'yummy2.png', size: 90 },
                { type: 'yummy', file: 'yummy3.png', size: 85 },
                { type: 'gift', file: 'gift1.png', size: 95 },
                { type: 'gift', file: 'gift2.png', size: 90 },
                { type: 'gift', file: 'gift3.png', size: 100 },
                { type: 'panties', file: 'panties1.png', size: 90 },
                { type: 'panties', file: 'panties2.png', size: 95 },
                { type: 'panties', file: 'panties3.png', size: 85 }
            ];

            const wishes = [
                "Счастья", "Радости", "Любви", "Удачи", "Вдохновения",
                "Нежности", "Улыбок", "Тепла", "Цветов", "Мечты"
            ];
            const wishColors = [
                '#ffb6c1', '#ff69b4', '#ff1493', '#db7090', '#c71585',
                '#d02090', '#da70d6', '#ee82ee', '#ffa07a', '#f08080'
            ];

            let loadedImages = [];
            let imagesToLoad = imageFiles.length;
            let loadedCount = 0;

            imageFiles.forEach((item) => {
                const img = new Image();
                img.src = `icons/${item.file}?v=9`; // увеличиваем версию для сброса кэша
                img.onload = () => {
                    loadedImages.push({
                        img: img,
                        type: item.type,
                        baseSize: item.size
                    });
                    loadedCount++;
                    if (loadedCount === imagesToLoad) {
                        startAnimation();
                    }
                };
                img.onerror = () => {
                    console.warn(`Не загрузилась: ${item.file}`);
                    loadedCount++;
                    if (loadedCount === imagesToLoad) {
                        startAnimation();
                    }
                };
            });

            let elements = [];
            let time = 0;

            function createRandomElement() {
                const isText = Math.random() > 0.5;
                if (isText) {
                    const wishIndex = Math.floor(Math.random() * wishes.length);
                    const colorIndex = Math.floor(Math.random() * wishColors.length);
                    const speedFactor = 2.5;
                    const baseSize = 48 + Math.random() * 20;
                    return {
                        type: 'text',
                        text: wishes[wishIndex],
                        color: wishColors[colorIndex],
                        baseSize: baseSize,
                        rotation: (Math.random() - 0.5) * 0.2,
                        x: Math.random() * width,
                        y: Math.random() * height,
                        vx: (Math.random() - 0.5) * speedFactor,
                        vy: (Math.random() - 0.5) * speedFactor,
                        scaleSpeed: 0.04 + Math.random() * 0.06, // скорость пульсации
                        scalePhase: Math.random() * Math.PI * 2,
                    };
                } else {
                    if (loadedImages.length === 0) return null;
                    const imgData = loadedImages[Math.floor(Math.random() * loadedImages.length)];
                    const speedFactor = 2.5;
                    const baseSize = imgData.baseSize * (0.8 + Math.random() * 0.6);
                    return {
                        type: 'image',
                        img: imgData.img,
                        baseType: imgData.type,
                        baseSize: baseSize,
                        rotation: (Math.random() - 0.5) * 0.2,
                        x: Math.random() * width,
                        y: Math.random() * height,
                        vx: (Math.random() - 0.5) * speedFactor,
                        vy: (Math.random() - 0.5) * speedFactor,
                        scaleSpeed: 0.04 + Math.random() * 0.06,
                        scalePhase: Math.random() * Math.PI * 2,
                    };
                }
            }

            function startAnimation() {
                const count = Math.min(50, Math.floor(width * height / 15000));
                for (let i = 0; i < count; i++) {
                    const el = createRandomElement();
                    if (el) elements.push(el);
                }
                requestAnimationFrame(update);
            }

            function draw() {
                ctx.clearRect(0, 0, width, height);
                
                for (let el of elements) {
                    // Масштаб от 1 до 3
                    const scale = 2.0 + 1.0 * Math.sin(time * el.scaleSpeed + el.scalePhase);
                    const displaySize = el.baseSize * scale;

                    ctx.save();
                    ctx.translate(el.x, el.y);
                    ctx.rotate(el.rotation);
                    
                    if (el.type === 'image') {
                        ctx.drawImage(el.img, -displaySize/2, -displaySize/2, displaySize, displaySize);
                    } else {
                        ctx.font = `${displaySize}px 'Great Vibes', cursive`;
                        ctx.fillStyle = el.color;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.shadowColor = 'rgba(255, 105, 180, 0.3)';
                        ctx.shadowBlur = 10;
                        ctx.shadowOffsetX = 2;
                        ctx.shadowOffsetY = 2;
                        ctx.fillText(el.text, 0, 0);
                    }
                    
                    ctx.restore();
                }
                
                time += 0.1; // скорость пульсации
                requestAnimationFrame(update);
            }

            function update() {
                const maxSpeed = 5.5;
                for (let el of elements) {
                    el.x += el.vx;
                    el.y += el.vy;

                    if (el.x < 0) { el.x = 0; el.vx *= -0.9; el.vy += (Math.random() - 0.5) * 0.2; }
                    if (el.x > width) { el.x = width; el.vx *= -0.9; el.vy += (Math.random() - 0.5) * 0.2; }
                    if (el.y < 0) { el.y = 0; el.vy *= -0.9; el.vx += (Math.random() - 0.5) * 0.2; }
                    if (el.y > height) { el.y = height; el.vy *= -0.9; el.vx += (Math.random() - 0.5) * 0.2; }

                    if (Math.random() < 0.005) {
                        el.vx += (Math.random() - 0.5) * 0.8;
                        el.vy += (Math.random() - 0.5) * 0.8;
                    }

                    if (Math.abs(el.vx) > maxSpeed) el.vx = Math.sign(el.vx) * maxSpeed;
                    if (Math.abs(el.vy) > maxSpeed) el.vy = Math.sign(el.vy) * maxSpeed;
                }
                draw();
            }

            function handleInteraction(e) {
                e.preventDefault();

                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;

                const mouseX = (clientX - rect.left) * scaleX;
                const mouseY = (clientY - rect.top) * scaleY;

                let closestDist = 150;
                let closestIndex = -1;

                for (let i = 0; i < elements.length; i++) {
                    const el = elements[i];
                    const radius = el.baseSize * 1.0; // увеличим радиус для лёгкого попадания
                    const dx = mouseX - el.x;
                    const dy = mouseY - el.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < radius && dist < closestDist) {
                        closestDist = dist;
                        closestIndex = i;
                    }
                }

                if (closestIndex !== -1) {
                    const heartImages = loadedImages.filter(img => img.type === 'heart');
                    if (heartImages.length > 0) {
                        const randomHeart = heartImages[Math.floor(Math.random() * heartImages.length)];
                        const newEl = elements[closestIndex];
                        newEl.type = 'image';
                        newEl.img = randomHeart.img;
                        newEl.baseType = 'heart';
                        newEl.baseSize = randomHeart.baseSize * (0.8 + Math.random() * 0.6);
                        delete newEl.text;
                        delete newEl.color;
                        newEl.baseSize *= 1.6;
                        setTimeout(() => {
                            newEl.baseSize /= 1.6;
                        }, 150);
                    }
                }
            }

            canvas.addEventListener('click', handleInteraction);
            canvas.addEventListener('touchstart', handleInteraction, { passive: false });
            canvas.addEventListener('contextmenu', (e) => e.preventDefault());

            setInterval(() => {
                if (elements.length < 70) {
                    const el = createRandomElement();
                    if (el) elements.push(el);
                }
            }, 4000);
        })();
    </script>
</body>
</html>
