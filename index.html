<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>С днём рождения, Лизонька! 💕</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffe6f0 0%, #ffd9e8 40%, #fbc4d5 100%);
            font-family: 'Caveat', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .title {
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            text-align: center;
            font-family: 'Pacifico', cursive;
            font-size: clamp(2.5rem, 10vw, 4rem);
            color: #b34180;
            text-shadow: 2px 2px 0 #ffb6c1, 4px 4px 10px rgba(255, 105, 180, 0.4);
            z-index: 10;
            pointer-events: none;
            animation: glow 3s ease-in-out infinite;
            padding: 0 10px;
        }
        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 2px #ff9eb5); }
            50% { filter: drop-shadow(0 0 15px #ff4080); }
        }
        .subtitle {
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-size: clamp(1.5rem, 6vw, 2.2rem);
            color: #d44e8c;
            opacity: 0.9;
            font-family: 'Caveat', cursive;
            z-index: 10;
            pointer-events: none;
            transform: rotate(-5deg);
            background: rgba(255,255,240,0.4);
            padding: 0.2rem 1rem;
            border-radius: 50px;
            backdrop-filter: blur(4px);
        }
        .hint {
            position: absolute;
            bottom: 15px;
            left: 20px;
            background: rgba(255, 240, 245, 0.7);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            color: #a53f6c;
            box-shadow: 0 4px 10px rgba(255, 105, 180, 0.3);
            border: 1px solid #ffa0c5;
            z-index: 10;
            font-family: 'Caveat', cursive;
            pointer-events: none;
            white-space: nowrap;
        }
        .hint span {
            display: inline-block;
            animation: bounce 1.2s infinite;
        }
        @keyframes bounce {
            0%,100%{ transform: translateY(0); }
            50%{ transform: translateY(-5px); }
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            touch-action: none;
        }
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            color: #b34180;
            z-index: 20;
            background: rgba(255,255,255,0.5);
            padding: 1rem 2rem;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <h1 class="title">✨ Лизонька, с днём рождения! ✨</h1>
    <div class="subtitle">Ты самое прекрасное, что есть 💗</div>
    <div class="hint"><span>👉</span> коснись любой картинки — станет сердечком <span>👈</span></div>
    <div class="loader" id="loader">✨ Загружаем сюрприз... ✨</div>
    <canvas id="birthdayCanvas"></canvas>

    <script>
        (function() {
            const canvas = document.getElementById('birthdayCanvas');
            const ctx = canvas.getContext('2d');
            const loader = document.getElementById('loader');

            let width, height;
            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // --------------------------------------------------------------
            // 1. Определяем все объекты (3D-картинки + текстовые поздравления)
            // --------------------------------------------------------------
            // Для картинок указываем type, url, запасной emoji (на случай ошибки)
            const itemsData = [
                // Котики
                { type: 'cat', url: 'https://d3j0lgo8z0xhzf.cloudfront.net/icons/3d/cat.png', fallback: '🐱', size: 90 },
                { type: 'cat', url: 'https://d3j0lgo8z0xhzf.cloudfront.net/icons/3d/cat.png', fallback: '😸', size: 90 },
                // Сердечки
                { type: 'heart', url: 'https://d3j0lgo8z0xhzf.cloudfront.net/icons/3d/heart.png', fallback: '❤️', size: 80 },
                { type: 'heart', url: 'https://d3j0lgo8z0xhzf.cloudfront.net/icons/3d/heart.png', fallback: '💖', size: 85 },
                // Цветочки
                { type: 'flower', url: 'https://d3j0lgo8z0xhzf.cloudfront.net/icons/3d/flower.png', fallback: '🌸', size: 85 },
                { type: 'flower', url: 'https://d3j0lgo8z0xhzf.cloudfront.net/icons/3d/flower.png', fallback: '🌼', size: 85 },
                // Розовые стринги (используем bra как ближайшее)
                { type: 'panties', url: 'https://d3j0lgo8z0xhzf.cloudfront.net/icons/3d/bra.png', fallback: '🩲', size: 80 },
                { type: 'panties', url: 'https://d3j0lgo8z0xhzf.cloudfront.net/icons/3d/bra.png', fallback: '🩲', size: 85 },
                // Вкусняшки
                { type: 'yummy', url: 'https://d3j0lgo8z0xhzf.cloudfront.net/icons/3d/cupcake.png', fallback: '🧁', size: 85 },
                { type: 'yummy', url: 'https://d3j0lgo8z0xhzf.cloudfront.net/icons/3d/cake.png', fallback: '🍰', size: 90 },
                { type: 'yummy', url: 'https://d3j0lgo8z0xhzf.cloudfront.net/icons/3d/candy.png', fallback: '🍬', size: 80 },
                { type: 'yummy', url: 'https://d3j0lgo8z0xhzf.cloudfront.net/icons/3d/donut.png', fallback: '🍩', size: 80 },
                // Текстовые поздравления (рисуем сами)
                { type: 'text', content: 'С днём рождения!', color: '#c71585', size: 40, font: 'Caveat' },
                { type: 'text', content: 'Лизонька 💖', color: '#d83d7a', size: 48, font: 'Pacifico' },
                { type: 'text', content: 'Ты чудо!', color: '#b34180', size: 40, font: 'Caveat' },
                { type: 'text', content: 'Обожаю тебя', color: '#e667af', size: 40, font: 'Caveat' },
                { type: 'text', content: 'Самая красивая', color: '#d43f8c', size: 42, font: 'Caveat' },
            ];

            // --------------------------------------------------------------
            // 2. Предзагружаем все изображения
            // --------------------------------------------------------------
            const preloadPromises = itemsData
                .filter(item => item.url) // только картинки
                .map(item => {
                    return new Promise((resolve) => {
                        const img = new Image();
                        img.crossOrigin = 'anonymous';
                        img.src = item.url;
                        img.onload = () => {
                            item.img = img;       // сохраняем загруженное изображение
                            item.loaded = true;
                            resolve(true);
                        };
                        img.onerror = () => {
                            console.warn('Не удалось загрузить:', item.url);
                            item.loaded = false;  // помечаем как не загруженное
                            resolve(false);
                        };
                    });
                });

            // Добавим таймаут на случай, если загрузка зависла (максимум 3 секунды)
            const timeoutPromise = new Promise(resolve => setTimeout(resolve, 3000));

            Promise.all([...preloadPromises, timeoutPromise]).then(() => {
                // Все изображения либо загружены, либо истекло время
                loader.style.display = 'none';
                startAnimation();
            });

            // --------------------------------------------------------------
            // 3. Создание летающих элементов
            // --------------------------------------------------------------
            let elements = [];

            function createRandomElement() {
                const data = itemsData[Math.floor(Math.random() * itemsData.length)];
                // Базовая структура
                const el = {
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 1.4,
                    vy: (Math.random() - 0.5) * 1.4,
                    type: data.type,
                    size: (data.size || 80) * (0.8 + Math.random() * 0.6),
                    rotation: (Math.random() - 0.5) * 0.2,
                };

                // Если это текст
                if (data.type === 'text') {
                    el.content = data.content;
                    el.color = data.color;
                    el.font = data.font;
                    el.isText = true;
                } 
                // Если это картинка
                else {
                    // Если изображение успешно загружено, используем его, иначе fallback эмодзи
                    if (data.loaded && data.img) {
                        el.img = data.img;
                        el.isImage = true;
                    } else {
                        // Запасной вариант: эмодзи
                        el.content = data.fallback;
                        el.color = '#ff69b4'; // розовый цвет для эмодзи
                        el.font = 'Caveat';
                        el.isText = true;
                    }
                }
                return el;
            }

            // Заполняем начальными элементами (количество зависит от экрана)
            const count = Math.min(35, Math.floor(width * height / 20000));
            for (let i = 0; i < count; i++) {
                elements.push(createRandomElement());
            }

            // --------------------------------------------------------------
            // 4. Анимация
            // --------------------------------------------------------------
            function draw() {
                ctx.clearRect(0, 0, width, height);
                
                for (let el of elements) {
                    ctx.save();
                    ctx.translate(el.x, el.y);
                    ctx.rotate(el.rotation);
                    
                    if (el.isImage && el.img) {
                        // Рисуем 3D-картинку
                        ctx.drawImage(el.img, -el.size/2, -el.size/2, el.size, el.size);
                    } else if (el.content) {
                        // Рисуем текст или эмодзи
                        ctx.font = `${el.size}px '${el.font}', 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif`;
                        ctx.fillStyle = el.color;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.shadowColor = 'rgba(255, 105, 180, 0.5)';
                        ctx.shadowBlur = 15;
                        ctx.shadowOffsetX = 2;
                        ctx.shadowOffsetY = 2;
                        ctx.fillText(el.content, 0, 0);
                    }
                    
                    ctx.restore();
                }
                
                requestAnimationFrame(update);
            }

            function update() {
                for (let el of elements) {
                    el.x += el.vx;
                    el.y += el.vy;

                    // Отскок от краёв
                    if (el.x < 0) { el.x = 0; el.vx *= -0.9; el.vy += (Math.random() - 0.5) * 0.2; }
                    if (el.x > width) { el.x = width; el.vx *= -0.9; el.vy += (Math.random() - 0.5) * 0.2; }
                    if (el.y < 0) { el.y = 0; el.vy *= -0.9; el.vx += (Math.random() - 0.5) * 0.2; }
                    if (el.y > height) { el.y = height; el.vy *= -0.9; el.vx += (Math.random() - 0.5) * 0.2; }

                    // Хаотичность
                    if (Math.random() < 0.005) {
                        el.vx += (Math.random() - 0.5) * 0.5;
                        el.vy += (Math.random() - 0.5) * 0.5;
                    }

                    // Ограничение скорости
                    const maxSpeed = 2.8;
                    if (Math.abs(el.vx) > maxSpeed) el.vx = Math.sign(el.vx) * maxSpeed;
                    if (Math.abs(el.vy) > maxSpeed) el.vy = Math.sign(el.vy) * maxSpeed;
                }
                
                draw();
            }

            function startAnimation() {
                requestAnimationFrame(update);
            }

            // --------------------------------------------------------------
            // 5. Обработка касаний/кликов (превращение в сердечко)
            // --------------------------------------------------------------
            function handleInteraction(e) {
                e.preventDefault();

                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;

                const mouseX = (clientX - rect.left) * scaleX;
                const mouseY = (clientY - rect.top) * scaleY;

                let closestDist = 120;
                let closestIndex = -1;

                for (let i = 0; i < elements.length; i++) {
                    const el = elements[i];
                    const radius = el.size * 0.6;
                    const dx = mouseX - el.x;
                    const dy = mouseY - el.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < radius && dist < closestDist) {
                        closestDist = dist;
                        closestIndex = i;
                    }
                }

                if (closestIndex !== -1) {
                    // Найти данные сердечка (любое сердечко из itemsData)
                    const heartData = itemsData.find(d => d.type === 'heart');
                    if (heartData) {
                        const newEl = elements[closestIndex];
                        // Превращаем в сердечко: либо картинку, либо эмодзи
                        if (heartData.loaded && heartData.img) {
                            newEl.isImage = true;
                            newEl.img = heartData.img;
                            newEl.isText = false;
                            newEl.content = null;
                        } else {
                            newEl.isText = true;
                            newEl.content = heartData.fallback || '❤️';
                            newEl.color = '#f06292';
                            newEl.font = 'Caveat';
                            newEl.isImage = false;
                        }
                        newEl.type = 'heart';
                        // Эффект пульса
                        newEl.size *= 1.5;
                        setTimeout(() => {
                            newEl.size /= 1.5;
                        }, 150);
                    }
                }
            }

            canvas.addEventListener('click', handleInteraction);
            canvas.addEventListener('touchstart', handleInteraction, { passive: false });
            canvas.addEventListener('contextmenu', (e) => e.preventDefault());

            // Иногда добавляем новые элементы
            setInterval(() => {
                if (elements.length < 50) {
                    elements.push(createRandomElement());
                }
            }, 8000);
        })();
    </script>
</body>
</html>
