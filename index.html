<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>С днём рождения Лиза</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Caveat&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:linear-gradient(145deg,#ffd0dd,#ff9eb5,#ff85a5);

background-size:400%;

animation:bg 12s infinite;

overflow:hidden;

font-family:Caveat;

}

@keyframes bg{

0%{background-position:0%}

50%{background-position:100%}

100%{background-position:0%}

}

.title{

position:absolute;

top:10px;

width:100%;

text-align:center;

font-family:Great Vibes;

font-size:clamp(3rem,9vw,5rem);

color:#8b1e5f;

animation:glow 3s infinite;

}

@keyframes glow{

0%,100%{

filter:drop-shadow(0 0 4px pink);

}

50%{

filter:drop-shadow(0 0 20px hotpink);

}

}

canvas{

position:absolute;

width:100vw;

height:100vh;

}

</style>

</head>

<body>

<h1 class="title">

С днём рождения Лиза 💗

</h1>

<canvas id="c"></canvas>

<script>

const canvas=c;

const ctx=canvas.getContext("2d");

let w,h,dpr;

function resize(){

w=innerWidth;

h=innerHeight;

dpr=devicePixelRatio||1;

canvas.width=w*dpr;

canvas.height=h*dpr;

canvas.style.width=w+"px";

canvas.style.height=h+"px";

ctx.setTransform(dpr,0,0,dpr,0,0);

}

addEventListener("resize",resize);

resize();


// AUDIO

const pop=new Audio("icons/pop.mp3");

function sound(){

pop.currentTime=0;

pop.play().catch(()=>{});

}


// DATA

let elements=[];

let particles=[];

let waves=[];

let time=0;


// PARTICLES

function burst(x,y,big=false){

let count=big?80:30;

for(let i=0;i<count;i++){

let a=Math.random()*6.28;

let s=big?4+Math.random()*8:2+Math.random()*5;

particles.push({

x,

y,

vx:Math.cos(a)*s,

vy:Math.sin(a)*s,

life:1,

size:big?6:4,

heart:Math.random()>.5

});

}

}


// WAVE

function shock(x,y){

waves.push({

x,

y,

r:10,

life:1

});

}


// ELEMENT

const wishes=[

"Любви",

"Счастья",

"Нежности",

"Мечты",

"Радости"

];

function spawn(){

let side=Math.floor(Math.random()*4);

let x;

let y;

let m=120;

if(side==0){x=-m;y=Math.random()*h;}

if(side==1){x=w+m;y=Math.random()*h;}

if(side==2){x=Math.random()*w;y=-m;}

if(side==3){x=Math.random()*w;y=h+m;}

let dx=w/2-x;

let dy=h/2-y;

let l=Math.hypot(dx,dy);

let s=2+Math.random()*3;

elements.push({

x,

y,

vx:dx/l*s,

vy:dy/l*s,

size:40+Math.random()*40,

rot:Math.random(),

rs:(Math.random()-.5)*.02,

text:wishes[Math.floor(Math.random()*wishes.length)],

opacity:0,

phase:Math.random()*6,

fly:false

});

}


// LOOP

function loop(){

time+=.1;

update();

draw();

requestAnimationFrame(loop);

}


// UPDATE

function update(){

elements.forEach(e=>{

e.x+=e.vx;

e.y+=e.vy;

e.vx*=.999;

e.vy*=.999;

e.rot+=e.rs;

if(e.opacity<1)

e.opacity+=.02;

});

particles.forEach(p=>{

p.x+=p.vx;

p.y+=p.vy;

p.vy+=.05;

p.life-=.02;

});

waves.forEach(w=>{

w.r+=8;

w.life-=.03;

});

particles=particles.filter(p=>p.life>0);

waves=waves.filter(w=>w.life>0);

}


// DRAW

function draw(){

ctx.fillStyle="rgba(255,255,255,.06)";

ctx.fillRect(0,0,w,h);


// elements

elements.forEach(e=>{

ctx.save();

ctx.globalAlpha=e.opacity;

ctx.translate(e.x,e.y);

ctx.rotate(e.rot);

let sc=1+.3*Math.sin(time*.05+e.phase);

let s=e.size*sc;

ctx.font=s+"px Great Vibes";

ctx.fillStyle="#ff4da6";

ctx.textAlign="center";

ctx.textBaseline="middle";

ctx.shadowColor="pink";

ctx.shadowBlur=20;

ctx.fillText(e.text,0,0);

ctx.restore();

});


// particles

particles.forEach(p=>{

ctx.save();

ctx.globalAlpha=p.life;

if(p.heart){

ctx.font=p.size*4+"px serif";

ctx.fillText("💗",p.x,p.y);

}else{

ctx.beginPath();

ctx.arc(p.x,p.y,p.size,0,6.28);

ctx.fillStyle="white";

ctx.fill();

}

ctx.restore();

});


// waves

waves.forEach(w=>{

ctx.save();

ctx.globalAlpha=w.life;

ctx.beginPath();

ctx.arc(w.x,w.y,w.r,0,6.28);

ctx.strokeStyle="pink";

ctx.lineWidth=3;

ctx.stroke();

ctx.restore();

});

}


// CLICK

canvas.onclick=e=>{

sound();

let x=e.clientX;

let y=e.clientY;

shock(x,y);

let mega=Math.random()<.08;

burst(x,y,mega);

};


// SPAWN

setInterval(()=>{

if(elements.length<60)

spawn();

},2500);


for(let i=0;i<30;i++)

spawn();

loop();

</script>

</body>

</html>
