<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С днём рождения, Лиза!</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Caveat:wght@400..700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{

min-height:100vh;

background:linear-gradient(
145deg,
#ffd0dd,
#ffb6c1,
#ff9eb5,
#ff85a5,
#ffb6d9
);

background-size:400% 400%;

animation:gradientBG 10s ease infinite;

font-family:'Caveat';

display:flex;
align-items:center;
justify-content:center;

overflow:hidden;

}

@keyframes gradientBG{

0%{background-position:0}

50%{background-position:100%}

100%{background-position:0}

}

.title{

position:absolute;

top:10px;

width:100%;

text-align:center;

font-family:'Great Vibes';

font-size:clamp(3rem,10vw,5rem);

color:#8b1e5f;

animation:glow 4s infinite;

z-index:5;

}

@keyframes glow{

0%,100%{

filter:drop-shadow(0 0 3px #ff9eb5);

}

50%{

filter:drop-shadow(0 0 10px #ff4080);

}

}

.hint{

position:absolute;

bottom:15px;
left:20px;

background:rgba(255,240,245,.7);

padding:.4rem .9rem;

border-radius:40px;

font-size:clamp(1.3rem,4vw,1.7rem);

color:#a53f6c;

z-index:5;

}

canvas{

position:absolute;

width:100vw;
height:100vh;

}

</style>
</head>

<body>

<h1 class="title">
С днём рождения, Лиза
</h1>

<div class="hint">
👉
</div>

<canvas id="birthdayCanvas"></canvas>

<script>

(function(){

const canvas=document.getElementById("birthdayCanvas");

const ctx=canvas.getContext("2d");

ctx.imageSmoothingEnabled=true;
ctx.imageSmoothingQuality="high";

let width;
let height;
let dpr;

function resize(){

width=window.innerWidth;

height=window.innerHeight;

dpr=window.devicePixelRatio||1;

canvas.width=width*dpr;

canvas.height=height*dpr;

canvas.style.width=width+"px";

canvas.style.height=height+"px";

ctx.setTransform(dpr,0,0,dpr,0,0);

}

window.addEventListener("resize",resize);

resize();


// AUDIO OPTIMIZED

let audioCtx;

let bgMusic;

let bgGain;

const popSound=new Audio('icons/pop.mp3');

popSound.preload="auto";


function playPop(){

popSound.currentTime=0;

popSound.play().catch(()=>{});

}


// PARTICLES POOL

let particles=[];

let maxParticles=140;

function createParticles(x,y){

for(let i=0;i<25;i++){

if(particles.length>maxParticles){

particles.shift();

}

let a=Math.random()*6.28;

let s=2+Math.random()*3;

particles.push({

x:x,

y:y,

vx:Math.cos(a)*s,

vy:Math.sin(a)*s,

life:1,

size:4+Math.random()*5,

color:'#ff6fa8'

});

}

}


// IMAGES

const files=[

'cat1.png','cat2.png','cat3.png','cat4.png','cat5.png',

'heart1.png','heart2.png','heart3.png',

'flower1.png','flower2.png','flower3.png',

'yummy1.png','yummy2.png','yummy3.png',

'gift1.png','gift2.png','gift3.png',

'panties1.png','panties2.png','panties3.png',

'present1.png','present2.png','present3.png',

'skel1.png','skel2.png','skel3.png'

];

let regular=[];

let presents=[];

let skels=[];

let loaded=0;

function ready(){

loaded++;

if(loaded===files.length){

shuffle();

start();

}

}

files.forEach(f=>{

let img=new Image();

img.src="icons/"+f;

img.onload=ready;

if(f.startsWith("skel"))skels.push(img);

else if(f.startsWith("present"))presents.push(img);

else regular.push(img);

});

let pool=[];

let index=0;

function shuffle(){

pool=[...regular];

for(let i=pool.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1));

[pool[i],pool[j]]=[pool[j],pool[i]];

}

index=0;

}


// ELEMENTS

let elements=[];

let time=0;

let spawnTimer=0;

const wishes=[

"Счастья",

"Любви",

"Нежности",

"Радости",

"Улыбок",

"Тепла",

"Мечты"

];


function create(){

let side=Math.floor(Math.random()*4);

let x;

let y;

let m=120;

if(side===0){x=-m;y=Math.random()*height;}

if(side===1){x=width+m;y=Math.random()*height;}

if(side===2){x=Math.random()*width;y=-m;}

if(side===3){x=Math.random()*width;y=height+m;}

let dx=width/2-x;

let dy=height/2-y;

let len=Math.hypot(dx,dy);

let speed=.6+Math.random()*1.3;

let vx=dx/len*speed;

let vy=dy/len*speed;

if(Math.random()>.5){

let img=pool[index++];

if(index>=pool.length)shuffle();

return{

type:'img',

img,

x,

y,

vx:vx*.5,

vy:vy*.5,

size:85+Math.random()*25,

rot:Math.random(),

rs:(Math.random()-.5)*.01,

opacity:0,

phase:Math.random()*6,

fly:false

};

}

return{

type:'text',

text:wishes[Math.floor(Math.random()*wishes.length)],

x,

y,

vx:vx*.5,

vy:vy*.5,

size:45+Math.random()*15,

rot:Math.random(),

rs:(Math.random()-.5)*.01,

opacity:0,

phase:Math.random()*6,

fly:false

};

}


// START

function start(){

let c=Math.min(

45,

width*height/18000

);

for(let i=0;i<c;i++){

elements.push(create());

}

loop();

}


// LOOP

function loop(){

update();

draw();

requestAnimationFrame(loop);

}


// UPDATE

function update(){

time+=.1;

spawnTimer++;

if(spawnTimer>240){

spawnTimer=0;

if(elements.length<65){

elements.push(create());

}

}

for(let i=elements.length-1;i>=0;i--){

let e=elements[i];

e.x+=e.vx;

e.y+=e.vy;

if(!e.fly){

e.vx*=1.0008;

e.vy*=1.0008;

}

e.vx*=.999;

e.vy*=.999;

e.rot+=e.rs;

if(e.opacity<1)e.opacity+=.02;

if(e.fly){

e.vy-=0.12;

e.vx*=0.99;

e.rot=0;

}

if(e.fly && e.y<-200){

elements.splice(i,1);

continue;

}

if(!e.fly){

if(e.x<0)e.x=width;

if(e.x>width)e.x=0;

if(e.y<0)e.y=height;

if(e.y>height)e.y=0;

}

}


particles.forEach(p=>{

p.x+=p.vx;

p.y+=p.vy;

p.vy+=.05;

p.life-=.02;

p.size*=.97;

});

particles=particles.filter(p=>p.life>0);

}


// DRAW

function draw(){

ctx.clearRect(

0,

0,

width,

height

);

elements.forEach(e=>{

ctx.save();

ctx.globalAlpha=e.opacity;

ctx.translate(e.x,e.y);

ctx.rotate(e.rot);

let scale=

1+.25*Math.sin(

time*.05+

e.phase

);

let s=e.size*scale;

if(e.type==='img'){

ctx.drawImage(

e.img,

-s/2,

-s/2,

s,

s

);

}

else{

ctx.font=s+"px Great Vibes";

ctx.fillStyle="#ff4da6";

ctx.textAlign="center";

ctx.textBaseline="middle";

ctx.fillText(

e.text,

0,

0

);

}

ctx.restore();

});


particles.forEach(p=>{

ctx.globalAlpha=p.life;

ctx.beginPath();

ctx.arc(

p.x,

p.y,

p.size,

0,

6.28

);

ctx.fillStyle=p.color;

ctx.fill();

});

}


// CLICK

canvas.addEventListener(

"click",

e=>{

if(!bgMusic){

audioCtx=

new(

window.AudioContext||

window.webkitAudioContext

)();

bgMusic=new Audio(

'icons/q.mp3'

);

let track=

audioCtx

.createMediaElementSource(

bgMusic

);

bgGain=

audioCtx

.createGain();

bgGain.gain.value=0;

track

.connect(bgGain)

.connect(

audioCtx.destination

);

bgMusic.loop=true;

bgMusic.play()

.then(

()=>fadeMusic()

);

}

let rect=

canvas

.getBoundingClientRect();

let x=

e.clientX-

rect.left;

let y=

e.clientY-

rect.top;

let r2=40*40;

let list=[];

elements.forEach(

(el,i)=>{

if(el.fly)return;

let dx=x-el.x;

let dy=y-el.y;

if(

dx*dx+

dy*dy

<r2

)

list.push(i);

}

);

if(list.length){

playPop();

let id=

list[

Math.floor(

Math.random()*list.length

)

];

let el=

elements[id];

createParticles(

el.x,

el.y

);

let newImg=

skels[

Math.floor(

Math.random()*skels.length

)

];

el.img=newImg;

el.fly=true;

el.vy=

-12-

Math.random()*6;

el.vx=

(Math.random()-.5)*1.5;

}

}

);


// MUSIC FADE

function fadeMusic(){

let target=3.5;

let step=.01;

let i=

setInterval(

()=>{

if(

bgGain.gain.value

<

target

){

bgGain.gain.value+=step;

}

else{

clearInterval(i);

}

},

50

);

}


})();
</script>

</body>
</html>
