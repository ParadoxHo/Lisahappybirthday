<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>С днём рождения, Лиза!</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Caveat:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{

min-height:100vh;

background:linear-gradient(145deg,
#ffd0dd,
#ffb6c1,
#ff9eb5,
#ff85a5,
#ffb6d9);

background-size:400% 400%;

animation:bg 10s ease infinite;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

font-family:Caveat;

}

@keyframes bg{

0%{background-position:0%}

50%{background-position:100%}

100%{background-position:0%}

}

.title{

position:absolute;

top:10px;

width:100%;

text-align:center;

font-family:"Great Vibes";

font-size:clamp(3rem,10vw,5rem);

color:#8b1e5f;

animation:glow 4s infinite;

}

@keyframes glow{

0%,100%{filter:drop-shadow(0 0 3px #ff9eb5)}

50%{filter:drop-shadow(0 0 8px #ff4080)}

}

.hint{

position:absolute;

bottom:15px;

left:20px;

background:rgba(255,240,245,.7);

padding:.4rem .9rem;

border-radius:40px;

font-size:1.6rem;

color:#a53f6c;

}

canvas{

position:absolute;

width:100vw;

height:100vh;

}

</style>

</head>

<body>

<h1 class="title">

С днём рождения, Лиза

</h1>

<div class="hint">

👉

</div>

<canvas id="birthdayCanvas"></canvas>

<script>

(function(){

const canvas=document.getElementById("birthdayCanvas");

const ctx=canvas.getContext("2d");

let width;
let height;
let dpr;

function resize(){

width=innerWidth;

height=innerHeight;

dpr=devicePixelRatio||1;

canvas.width=width*dpr;

canvas.height=height*dpr;

ctx.setTransform(dpr,0,0,dpr,0,0);

}

addEventListener("resize",resize);

resize();


// COLORS

const pinks=[

"#ff6fa8",
"#ff8fb8",
"#ff77aa",
"#ff9ec4",
"#ff5fa2",
"#ff85b5",
"#ff7fb0"

];


// SOUND

const pop=new Audio('icons/pop.mp3');

function playPop(){

pop.currentTime=0;

pop.play().catch(()=>{});

}


// PARTICLES

let particles=[];
let waves=[];

function createParticles(x,y){

for(let i=0;i<20;i++){

let a=Math.random()*6.28;

let s=1+Math.random()*2.5;

particles.push({

x,
y,

vx:Math.cos(a)*s,

vy:Math.sin(a)*s,

life:1,

size:3+Math.random()*3

});

}

waves.push({

x,
y,

r:5,

life:1

});

}


// DATA

const wishes=[

"Счастья",
"Любви",
"Нежности",
"Радости",
"Улыбок",
"Тепла",
"Мечты"

];


// ELEMENTS

let elements=[];

let time=0;


function create(){

let x;
let y;

let tries=0;

do{

x=Math.random()*width;

y=Math.random()*height;

tries++;

}while(

tries<20 &&

elements.some(e=>

Math.hypot(e.x-x,e.y-y)<120

)

);


if(Math.random()>.5){

return{

type:'text',

text:wishes[Math.floor(Math.random()*wishes.length)],

color:pinks[Math.floor(Math.random()*pinks.length)],

x,
y,

vx:(Math.random()-.5)*1,

vy:(Math.random()-.5)*1,

size:30+Math.random()*35,

rot:(Math.random()-.5)*.2,

rs:(Math.random()-.5)*.01,

opacity:0,

fly:false

};

}

return null;

}


// START

function start(){

for(let i=0;i<40;i++){

let e=create();

if(e)elements.push(e);

}

loop();

}

start();


// LOOP

function loop(){

update();

draw();

requestAnimationFrame(loop);

}


// UPDATE

function update(){

time+=.1;

for(let i=elements.length-1;i>=0;i--){

let e=elements[i];

e.x+=e.vx;

e.y+=e.vy;

e.rot+=e.rs;

if(e.opacity<1)
e.opacity+=.02;

if(e.fly){

e.vy-=0.03;

e.rot=0;

}

if(e.fly && e.y<-200){

elements.splice(i,1);

continue;

}

if(e.x<0)e.x=width;
if(e.x>width)e.x=0;

if(e.y<0)e.y=height;
if(e.y>height)e.y=0;

}


particles.forEach(p=>{

p.x+=p.vx;

p.y+=p.vy;

p.life-=.03;

p.size*=.97;

});

waves.forEach(w=>{

w.r+=4;

w.life-=.04;

});

particles=particles.filter(p=>p.life>0);

waves=waves.filter(w=>w.life>0);


if(elements.length<30){

let e=create();

if(e)elements.push(e);

}

}


// DRAW

function draw(){

ctx.clearRect(0,0,width,height);

elements.forEach(e=>{

ctx.save();

ctx.globalAlpha=e.opacity;

ctx.translate(e.x,e.y);

ctx.rotate(e.rot);

ctx.font="300 "+e.size+"px Caveat";

ctx.fillStyle=e.color;

ctx.textAlign="center";

ctx.textBaseline="middle";

ctx.fillText(e.text,0,0);

ctx.restore();

});


particles.forEach(p=>{

ctx.save();

ctx.globalAlpha=p.life;

ctx.beginPath();

ctx.arc(p.x,p.y,p.size,0,6.28);

ctx.fillStyle="#ff6fa8";

ctx.fill();

ctx.restore();

});


waves.forEach(w=>{

ctx.save();

ctx.globalAlpha=w.life;

ctx.beginPath();

ctx.arc(w.x,w.y,w.r,0,6.28);

ctx.strokeStyle="#ff9eb5";

ctx.stroke();

ctx.restore();

});

}


// CLICK

canvas.addEventListener("click",e=>{

let rect=canvas.getBoundingClientRect();

let x=e.clientX-rect.left;

let y=e.clientY-rect.top;

let r2=70*70;

let hit=[];

elements.forEach((el,i)=>{

if(el.fly)return;

let dx=x-el.x;

let dy=y-el.y;

if(dx*dx+dy*dy<r2)
hit.push(i);

});

if(hit.length){

playPop();

let el=elements[hit[0]];

createParticles(el.x,el.y);

el.fly=true;

el.vy=-3-Math.random()*1.5;

}

});


})();
</script>

</body>
</html>
