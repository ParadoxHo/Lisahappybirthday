<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С днём рождения, Лиза!</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Caveat:wght@400..700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
    min-height:100vh;
    background:linear-gradient(145deg,#ffd0dd,#ffb6c1,#ff9eb5,#ff85a5,#ffb6d9);
    background-size:400% 400%;
    animation:gradientBG 10s ease infinite;
    font-family:'Caveat';
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}
@keyframes gradientBG{
    0%{background-position:0}
    50%{background-position:100%}
    100%{background-position:0}
}
.title{
    position:absolute;
    top:10px;
    width:100%;
    text-align:center;
    font-family:'Great Vibes';
    font-size:clamp(3rem,10vw,5rem);
    color:#8b1e5f;
    animation:glow 4s infinite;
    z-index:5;
}
@keyframes glow{
    0%,100%{filter:drop-shadow(0 0 3px #ff9eb5);}
    50%{filter:drop-shadow(0 0 8px #ff4080);}
}
.hint{
    position:absolute;
    bottom:15px;
    left:20px;
    background:rgba(255,240,245,.7);
    padding:.4rem .9rem;
    border-radius:40px;
    font-size:clamp(1.3rem,4vw,1.7rem);
    color:#a53f6c;
    z-index:5;
}
canvas{
    position:absolute;
    width:100vw;
    height:100vh;
}
</style>
</head>
<body>
<h1 class="title">С днём рождения, Лиза</h1>
<div class="hint">👉</div>
<canvas id="birthdayCanvas"></canvas>

<script>
(function(){
const canvas=document.getElementById("birthdayCanvas");
const ctx=canvas.getContext("2d");

let width,height,dpr;
function resize(){
    width=window.innerWidth;
    height=window.innerHeight;
    dpr=window.devicePixelRatio||1;
    canvas.width=width*dpr;
    canvas.height=height*dpr;
    canvas.style.width=width+"px";
    canvas.style.height=height+"px";
    ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener("resize",resize);
resize();

// ================== Фоновая музыка ==================
let bgMusic=null;
let bgGain=null;
let audioCtx=null;

// ================== ЗВУК ПОП ==================
function playPop(){
    new Audio('icons/pop.mp3').play().catch(()=>{});
}

// ================== ЧАСТИЦЫ ==================
let particles = [];
let waves = [];
let flashes = [];

function createParticles(x, y, count = 12) {
    for (let i = 0; i < count; i++) {
        let angle = Math.random() * 2 * Math.PI;
        let speed = 1 + Math.random() * 3;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 1,
            life: 1,
            size: 3 + Math.random() * 4,
            color: `rgba(255, 120, 180, ${0.8+Math.random()*0.2})`
        });
    }
}

function createCelebration() {
    for (let i = 0; i < 40; i++) {
        let angle = Math.random() * 2 * Math.PI;
        let speed = 2 + Math.random() * 5;
        particles.push({
            x: width / 2,
            y: height / 2,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 2,
            life: 1,
            size: 5 + Math.random() * 6,
            color: `rgba(255, ${100+Math.random()*100}, 150, 1)`
        });
    }
    waves.push({ x: width / 2, y: height / 2, r: 20, life: 1 });
}

function createFlash(x, y) {
    flashes.push({ x, y, radius: 10, life: 1 });
}

// ================== ИЗОБРАЖЕНИЯ ==================
const imageFiles = [
    'cat1.png','cat2.png','cat3.png','cat4.png','cat5.png',
    'heart1.png','heart2.png','heart3.png',
    'flower1.png','flower2.png','flower3.png',
    'yummy1.png','yummy2.png','yummy3.png',
    'gift1.png','gift2.png','gift3.png',
    'panties1.png','panties2.png','panties3.png',
    'present1.png','present2.png','present3.png',
    'skel1.png','skel2.png','skel3.png'
];

let regularImages = [];
let skelImages = [];
let presentImages = [];
let imagePool = [];
let imageIndex = 0;
let loadedCount = 0;
const totalImages = imageFiles.length;

function shuffleImages(){
    if (regularImages.length === 0) return;
    imagePool = [...regularImages];
    for (let i = imagePool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [imagePool[i], imagePool[j]] = [imagePool[j], imagePool[i]];
    }
    imageIndex = 0;
}

function ready(){
    loadedCount++;
    if (loadedCount === totalImages) {
        console.log('✅ Все изображения загружены. Обычных:', regularImages.length, 'Скелетиков:', skelImages.length, 'Подарков:', presentImages.length);
        if (skelImages.length === 0) console.warn('⚠️ Нет скелетиков! Проверьте файлы skel1-3.png');
        if (presentImages.length === 0) console.warn('⚠️ Нет present-изображений! Проверьте файлы present1-3.png');
        shuffleImages();
        start();
    }
}

imageFiles.forEach(f => {
    const img = new Image();
    img.src = "icons/" + f;
    img.onload = () => {
        if (f.startsWith('skel')) skelImages.push(img);
        else if (f.startsWith('present')) presentImages.push(img);
        else regularImages.push(img);
        ready();
    };
    img.onerror = () => {
        console.warn('❌ Ошибка загрузки:', f);
        ready();
    };
});

// ================== ЭЛЕМЕНТЫ ==================
let elements = [];
let time = 0;
const wishes = ["Счастья","Любви","Нежности","Радости","Улыбок","Тепла","Мечты"];

// ================== СЧЁТЧИК КЛИКОВ ==================
let clickCount = 0;
let celebrationDone = false;

// ================== РУКА-УКАЗАТЕЛЬ ==================
let hand = null;
let firstClickDone = false;

function findCat1() {
    for (let i = 0; i < elements.length; i++) {
        const el = elements[i];
        if (el.type === 'img' && !el.fly && el.img.src && el.img.src.includes('cat1.png')) return i;
    }
    return -1;
}

function createHand() {
    if (firstClickDone) return;
    const idx = findCat1();
    if (idx !== -1) {
        hand = {
            targetIndex: idx,
            offsetX: -70,
            offsetY: -20,
            phase: Math.random() * 2 * Math.PI,
            scale: 1,
        };
    }
}

function updateHand() {
    if (!hand || firstClickDone) return;
    const target = elements[hand.targetIndex];
    if (!target || target.fly || (target.type === 'img' && !target.img.src.includes('cat1.png'))) {
        const newIdx = findCat1();
        hand = newIdx !== -1 ? { ...hand, targetIndex: newIdx } : null;
        return;
    }
    hand.phase += 0.05;
    hand.scale = 1 + Math.sin(hand.phase * 2) * 0.1;
}

// ================== СОЗДАНИЕ НОВОГО ЭЛЕМЕНТА ==================
function create() {
    const side = Math.floor(Math.random() * 4);
    let x, y;
    const margin = 120;
    if (side === 0) { x = -margin; y = Math.random() * height; }
    else if (side === 1) { x = width + margin; y = Math.random() * height; }
    else if (side === 2) { x = Math.random() * width; y = -margin; }
    else { x = Math.random() * width; y = height + margin; }

    const dx = width / 2 - x;
    const dy = height / 2 - y;
    const len = Math.hypot(dx, dy);
    const speed = 0.6 + Math.random() * 1.4;
    const vx = (dx / len) * speed;
    const vy = (dy / len) * speed;

    if (Math.random() > 0.5 && regularImages.length > 0 && imagePool.length > 0) {
        const img = imagePool[imageIndex++];
        if (imageIndex >= imagePool.length) shuffleImages();
        // Определяем оригинальный тип: подарок или обычная картинка
        const originalType = img.src.includes('gift') ? 'gift' : 'regular';
        return {
            type: 'img',
            originalType,
            img,
            x, y,
            vx: vx * 0.5,
            vy: vy * 0.5,
            size: 85 + Math.random() * 25,
            rot: Math.random(),
            rs: (Math.random() - 0.5) * 0.01,
            opacity: 0,
            phase: Math.random() * 6,
            fly: false
        };
    } else {
        return {
            type: 'text',
            text: wishes[Math.floor(Math.random() * wishes.length)],
            x, y,
            vx: vx * 0.5,
            vy: vy * 0.5,
            size: 45 + Math.random() * 15,
            rot: Math.random(),
            rs: (Math.random() - 0.5) * 0.01,
            opacity: 0,
            phase: Math.random() * 6,
            fly: false
        };
    }
}

// ================== СТАРТ ==================
function start() {
    const count = Math.min(45, Math.floor(width * height / 20000));
    for (let i = 0; i < count; i++) {
        const el = create();
        if (el) elements.push(el);
    }
    setTimeout(createHand, 500);
    const checkInterval = setInterval(() => {
        if (!hand && !firstClickDone) createHand();
        if (firstClickDone) {
            clearInterval(checkInterval);
            hand = null;
        }
    }, 2000);
    loop();
}

// ================== ЦИКЛ ==================
function loop() { update(); draw(); requestAnimationFrame(loop); }

// ================== ОБНОВЛЕНИЕ ==================
function update() {
    time += 0.1;
    const maxSpeed = 2.2;

    for (let i = elements.length - 1; i >= 0; i--) {
        const e = elements[i];
        e.x += e.vx;
        e.y += e.vy;

        if (!e.fly) {
            e.vx *= 1.002;
            e.vy *= 1.002;
        }
        e.vx *= 0.999;
        e.vy *= 0.999;

        if (Math.abs(e.vx) > maxSpeed) e.vx = Math.sign(e.vx) * maxSpeed;
        if (Math.abs(e.vy) > maxSpeed) e.vy = Math.sign(e.vy) * maxSpeed;

        e.rot += e.rs;
        if (e.opacity < 1) e.opacity += 0.02;

        if (e.fly) {
            e.vy -= 0.1;
            e.vx *= 0.99;
            e.rot = 0;
            e.rs = 0;
            if (e.y < -200) {
                elements.splice(i, 1);
                continue;
            }
        } else {
            if (e.x < 0) e.x = width;
            if (e.x > width) e.x = 0;
            if (e.y < 0) e.y = height;
            if (e.y > height) e.y = 0;
        }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.04;
        p.life -= 0.02;
        p.size *= 0.97;
        if (p.life <= 0 || p.size < 1) particles.splice(i, 1);
    }
    if (particles.length > 100) particles = particles.slice(-100);

    for (let i = waves.length - 1; i >= 0; i--) {
        const w = waves[i];
        w.r += 5;
        w.life -= 0.03;
        if (w.life <= 0) waves.splice(i, 1);
    }

    for (let i = flashes.length - 1; i >= 0; i--) {
        const f = flashes[i];
        f.radius += 8;
        f.life -= 0.02;
        if (f.life <= 0) flashes.splice(i, 1);
    }

    if (elements.length < 35) {
        const el = create();
        if (el) elements.push(el);
    }

    updateHand();
}

// ================== РИСОВАНИЕ ==================
function draw() {
    ctx.clearRect(0, 0, width, height);

    for (const e of elements) {
        ctx.save();
        ctx.globalAlpha = e.opacity;
        ctx.translate(e.x, e.y);
        ctx.rotate(e.rot);
        const scale = 1 + 0.25 * Math.sin(time * 0.05 + e.phase);
        const s = e.size * scale;
        if (e.type === 'img') {
            if (e.img.complete) ctx.drawImage(e.img, -s/2, -s/2, s, s);
        } else {
            ctx.font = s + "px Great Vibes";
            ctx.fillStyle = "#ff4da6";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(e.text, 0, 0);
        }
        ctx.restore();
    }

    if (hand && !firstClickDone) {
        const target = elements[hand.targetIndex];
        if (target && !target.fly) {
            ctx.save();
            ctx.globalAlpha = 0.9;
            ctx.translate(target.x + hand.offsetX, target.y + hand.offsetY);
            ctx.scale(hand.scale, hand.scale);
            ctx.font = "60px 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif";
            ctx.fillStyle = "#ff3388";
            ctx.shadowColor = "rgba(255,20,100,0.5)";
            ctx.shadowBlur = 15;
            ctx.shadowOffsetX = 3;
            ctx.shadowOffsetY = 3;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("👉", 0, 0);
            ctx.restore();
        } else {
            createHand();
        }
    }

    for (const f of flashes) {
        ctx.save();
        ctx.globalAlpha = f.life;
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.radius, 0, 2 * Math.PI);
        ctx.strokeStyle = "#ffb6c1";
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.restore();
    }

    for (const p of particles) {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, 2 * Math.PI);
        ctx.fill();
        ctx.restore();
    }

    for (const w of waves) {
        ctx.save();
        ctx.globalAlpha = w.life;
        ctx.beginPath();
        ctx.arc(w.x, w.y, w.r, 0, 2 * Math.PI);
        ctx.strokeStyle = "#ff9eb5";
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.restore();
    }
}

// ================== КЛИК ==================
canvas.addEventListener("click", e => {
    if (!bgMusic) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        bgMusic = new Audio('icons/q.mp3');
        const track = audioCtx.createMediaElementSource(bgMusic);
        bgGain = audioCtx.createGain();
        bgGain.gain.value = 0;
        track.connect(bgGain).connect(audioCtx.destination);
        bgMusic.loop = true;
        bgMusic.play().then(fadeInMusic);
    }

    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * dpr;
    const y = (e.clientY - rect.top) * dpr;
    const r2 = 40 * 40;

    const candidates = [];
    elements.forEach((el, i) => {
        if (el.fly) return;
        const dx = x - el.x;
        const dy = y - el.y;
        if (dx * dx + dy * dy < r2) candidates.push(i);
    });

    if (candidates.length) {
        if (!firstClickDone) {
            firstClickDone = true;
            hand = null;
        }

        playPop();
        createFlash(x, y);

        const id = candidates[Math.floor(Math.random() * candidates.length)];
        const el = elements[id];
        createParticles(el.x, el.y, 12);

        let newImg = null;
        // Определяем, во что превращать, используя originalType
        if (el.type === 'img') {
            if (el.originalType === 'gift') {
                if (presentImages.length > 0) {
                    newImg = presentImages[Math.floor(Math.random() * presentImages.length)];
                    console.log('Превращение подарка в present');
                } else if (skelImages.length > 0) {
                    newImg = skelImages[Math.floor(Math.random() * skelImages.length)];
                    console.log('presentImages пуст, используется скелетик');
                }
            } else { // regular
                if (skelImages.length > 0) {
                    newImg = skelImages[Math.floor(Math.random() * skelImages.length)];
                    console.log('Превращение обычной картинки в скелетик');
                }
            }
        } else { // text
            if (skelImages.length > 0) {
                newImg = skelImages[Math.floor(Math.random() * skelImages.length)];
                console.log('Превращение текста в скелетик');
            }
        }

        if (newImg) {
            el.type = 'img';
            el.img = newImg;
            // Сбрасываем originalType, так как теперь это не подарок (можно удалить)
            delete el.originalType;
            el.fly = true;
            el.vy = -12 - Math.random() * 6;
            el.vx = (Math.random() - 0.5) * 1.5;
            el.size *= 1.25;
            setTimeout(() => { el.size /= 1.25; }, 150);
        } else {
            console.warn('❌ Не удалось выбрать изображение для превращения, объект остаётся без изменений');
        }

        clickCount++;
        if (clickCount === 10 && !celebrationDone) {
            createCelebration();
            celebrationDone = true;
        }

        setTimeout(() => {
            const newEl = create();
            if (newEl) elements.push(newEl);
        }, 600);
    }
});

setInterval(() => {
    if (elements.length < 65) {
        const el = create();
        if (el) elements.push(el);
    }
}, 4000);

function fadeInMusic() {
    if (!bgGain) return;
    const target = 3.5;
    const step = 0.01;
    const interval = setInterval(() => {
        if (bgGain.gain.value < target) {
            bgGain.gain.value = Math.min(bgGain.gain.value + step, target);
        } else {
            clearInterval(interval);
        }
    }, 50);
}
})();
</script>
</body>
  </html>
