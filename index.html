<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>С днём рождения, Лиза!</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Caveat:wght@400..700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffd0dd, #ffb6c1, #ff9eb5, #ff85a5, #ffb6d9);
            background-size: 400% 400%;
            animation: gradientBG 8s ease infinite;
            font-family: 'Caveat', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 0%; }
            25% { background-position: 50% 50%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 50% 50%; }
            100% { background-position: 0% 0%; }
        }
        .title {
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            text-align: center;
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3rem, 12vw, 5rem);
            color: #8b1e5f;
            font-weight: 300;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.3);
            z-index: 10;
            pointer-events: none;
            animation: glow 3s ease-in-out infinite;
            padding: 0 10px;
        }
        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 2px #ff9eb5); }
            50% { filter: drop-shadow(0 0 8px #ff4080); }
        }
        .subtitle {
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-size: clamp(1.5rem, 6vw, 2.2rem);
            color: #d44e8c;
            opacity: 0.9;
            font-family: 'Caveat', cursive;
            z-index: 10;
            pointer-events: none;
            transform: rotate(-5deg);
            background: rgba(255,255,240,0.4);
            padding: 0.2rem 1rem;
            border-radius: 50px;
            backdrop-filter: blur(4px);
        }
        .hint {
            position: absolute;
            bottom: 15px;
            left: 20px;
            background: rgba(255, 240, 245, 0.7);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            color: #a53f6c;
            box-shadow: 0 4px 10px rgba(255, 105, 180, 0.3);
            border: 1px solid #ffa0c5;
            z-index: 10;
            font-family: 'Caveat', cursive;
            pointer-events: none;
            white-space: nowrap;
        }
        .hint span {
            display: inline-block;
            animation: bounce 1.2s infinite;
        }
        @keyframes bounce {
            0%,100%{ transform: translateY(0); }
            50%{ transform: translateY(-5px); }
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            touch-action: none;
        }
    </style>
</head>
<body>
    <h1 class="title">С днём рождения, Лиза</h1>
    <div class="subtitle">Ты самое прекрасное, что есть 💗</div>
    <div class="hint"><span>👉</span> коснись любой картинки или пожелания — превратится в скелетик и улетит <span>👈</span></div>
    <canvas id="birthdayCanvas"></canvas>

    <script>
        (function() {
            const canvas = document.getElementById('birthdayCanvas');
            const ctx = canvas.getContext('2d');

            let width, height;
            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // ==================== ЗВУК ====================
            function playPop() {
                const sound = new Audio('icons/pop.mp3?v=2');
                sound.play().catch(e => console.warn('Звук не воспроизведён:', e));
            }

            // ==================== ЧАСТИЦЫ ====================
            let particles = [];

            function createParticles(x, y, count = 30) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * 2 * Math.PI;
                    const speed = 2 + Math.random() * 6;
                    particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 3,
                        size: 6 + Math.random() * 12,
                        color: `hsl(${Math.random() * 20 + 340}, 80%, 70%)`,
                        opacity: 1,
                        decay: 0.01 + Math.random() * 0.02
                    });
                }
            }

            // ==================== КАРТИНКИ ====================
            const imageFiles = [
                // 5 котов
                { type: 'regular', file: 'cat1.png', size: 100 },
                { type: 'regular', file: 'cat2.png', size: 105 },
                { type: 'regular', file: 'cat3.png', size: 95 },
                { type: 'regular', file: 'cat4.png', size: 100 },
                { type: 'regular', file: 'cat5.png', size: 100 },
                // 3 сердечка
                { type: 'regular', file: 'heart1.png', size: 90 },
                { type: 'regular', file: 'heart2.png', size: 95 },
                { type: 'regular', file: 'heart3.png', size: 85 },
                // 3 цветка
                { type: 'regular', file: 'flower1.png', size: 90 },
                { type: 'regular', file: 'flower2.png', size: 95 },
                { type: 'regular', file: 'flower3.png', size: 85 },
                // 3 вкусняшки
                { type: 'regular', file: 'yummy1.png', size: 100 },
                { type: 'regular', file: 'yummy2.png', size: 90 },
                { type: 'regular', file: 'yummy3.png', size: 85 },
                // 3 подарка
                { type: 'regular', file: 'gift1.png', size: 95 },
                { type: 'regular', file: 'gift2.png', size: 90 },
                { type: 'regular', file: 'gift3.png', size: 100 },
                // 3 трусиков
                { type: 'regular', file: 'panties1.png', size: 90 },
                { type: 'regular', file: 'panties2.png', size: 95 },
                { type: 'regular', file: 'panties3.png', size: 85 },
                // Скелетики
                { type: 'skel', file: 'skel1.png', size: 100 },
                { type: 'skel', file: 'skel2.png', size: 100 },
                { type: 'skel', file: 'skel3.png', size: 100 }
            ];

            const wishes = [
                "Счастья", "Радости", "Любви", "Удачи", "Вдохновения",
                "Нежности", "Улыбок", "Тепла", "Цветов", "Мечты"
            ];
            const wishColors = [
                '#ffb6c1', '#ff69b4', '#ff1493', '#db7090', '#c71585',
                '#d02090', '#da70d6', '#ee82ee', '#ffa07a', '#f08080'
            ];

            let regularImages = [];
            let skelImages = [];
            let imagesToLoad = imageFiles.length;
            let loadedCount = 0;

            imageFiles.forEach((item) => {
                const img = new Image();
                img.src = `icons/${item.file}?v=23`; // версия для сброса кэша
                img.onload = () => {
                    const loaded = {
                        img: img,
                        type: item.type,
                        baseSize: item.size
                    };
                    if (item.type === 'regular') regularImages.push(loaded);
                    if (item.type === 'skel') skelImages.push(loaded);

                    loadedCount++;
                    if (loadedCount === imagesToLoad) {
                        console.log('✅ Загружено обычных:', regularImages.length, 'скелетиков:', skelImages.length);
                        startAnimation();
                    }
                };
                img.onerror = () => {
                    console.warn(`❌ Не загрузилась: ${item.file}`);
                    loadedCount++;
                    if (loadedCount === imagesToLoad) {
                        console.log('✅ Загружено обычных:', regularImages.length, 'скелетиков:', skelImages.length);
                        startAnimation();
                    }
                };
            });

            let elements = [];
            let time = 0;

            // Функция создания нового элемента с появлением за пределами экрана
            function createRandomElement() {
                const isText = Math.random() > 0.5; // строго 50% на текст

                // Генерируем позицию за пределами экрана
                const side = Math.floor(Math.random() * 4); // 0-слева, 1-справа, 2-сверху, 3-снизу
                let x, y;
                const margin = 100; // отступ от края
                if (side === 0) { // слева
                    x = -margin;
                    y = Math.random() * height;
                } else if (side === 1) { // справа
                    x = width + margin;
                    y = Math.random() * height;
                } else if (side === 2) { // сверху
                    x = Math.random() * width;
                    y = -margin;
                } else { // снизу
                    x = Math.random() * width;
                    y = height + margin;
                }

                // Направление всегда внутрь экрана
                let targetX = width / 2;
                let targetY = height / 2;
                let dx = targetX - x;
                let dy = targetY - y;
                let length = Math.sqrt(dx*dx + dy*dy);
                let baseSpeed = 2 + Math.random() * 6; // скорость 2..8
                let vx = (dx / length) * baseSpeed * (0.8 + 0.4 * Math.random());
                let vy = (dy / length) * baseSpeed * (0.8 + 0.4 * Math.random());

                if (isText) {
                    const wishIndex = Math.floor(Math.random() * wishes.length);
                    const colorIndex = Math.floor(Math.random() * wishColors.length);
                    const baseSize = 48 + Math.random() * 20;
                    return {
                        type: 'text',
                        text: wishes[wishIndex],
                        color: wishColors[colorIndex],
                        baseSize: baseSize,
                        rotation: (Math.random() - 0.5) * 0.2,
                        x: x,
                        y: y,
                        vx: vx,
                        vy: vy,
                        scaleSpeed: 0.04 + Math.random() * 0.06,
                        scalePhase: Math.random() * Math.PI * 2,
                        isFlyingAway: false
                    };
                } else {
                    if (regularImages.length === 0) return null;
                    const imgData = regularImages[Math.floor(Math.random() * regularImages.length)];
                    const baseSize = imgData.baseSize * (0.8 + Math.random() * 0.6);
                    return {
                        type: 'image',
                        img: imgData.img,
                        baseSize: baseSize,
                        rotation: (Math.random() - 0.5) * 0.2,
                        x: x,
                        y: y,
                        vx: vx,
                        vy: vy,
                        scaleSpeed: 0.04 + Math.random() * 0.06,
                        scalePhase: Math.random() * Math.PI * 2,
                        isFlyingAway: false
                    };
                }
            }

            function startAnimation() {
                const count = Math.min(50, Math.floor(width * height / 15000));
                for (let i = 0; i < count; i++) {
                    const el = createRandomElement();
                    if (el) elements.push(el);
                }
                requestAnimationFrame(update);
            }

            function draw() {
                ctx.clearRect(0, 0, width, height);
                
                // Рисуем основные элементы
                for (let i = elements.length - 1; i >= 0; i--) {
                    const el = elements[i];
                    let scale;
                    if (el.type === 'image') {
                        scale = 1.6 + 0.9 * Math.sin(time * el.scaleSpeed + el.scalePhase);
                    } else {
                        scale = 1.0 + 0.5 * Math.sin(time * el.scaleSpeed + el.scalePhase);
                    }
                    const displaySize = el.baseSize * scale;

                    ctx.save();
                    ctx.translate(el.x, el.y);
                    ctx.rotate(el.rotation);
                    
                    if (el.type === 'image') {
                        ctx.drawImage(el.img, -displaySize/2, -displaySize/2, displaySize, displaySize);
                    } else {
                        ctx.font = `${displaySize}px 'Great Vibes', cursive`;
                        ctx.fillStyle = el.color;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.shadowColor = 'rgba(255, 105, 180, 0.3)';
                        ctx.shadowBlur = 10;
                        ctx.shadowOffsetX = 2;
                        ctx.shadowOffsetY = 2;
                        ctx.fillText(el.text, 0, 0);
                    }
                    
                    ctx.restore();
                }

                // Рисуем частицы
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    ctx.save();
                    ctx.globalAlpha = p.opacity;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    const gradient = ctx.createRadialGradient(p.x - 2, p.y - 2, 1, p.x, p.y, p.size);
                    gradient.addColorStop(0, '#fff');
                    gradient.addColorStop(0.5, p.color);
                    gradient.addColorStop(1, '#ff1493');
                    ctx.fillStyle = gradient;
                    ctx.fill();
                    ctx.restore();

                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.1;
                    p.opacity -= p.decay;
                    p.size *= 0.98;

                    if (p.opacity <= 0 || p.size < 1) {
                        particles.splice(i, 1);
                    }
                }
                
                time += 0.1;
                requestAnimationFrame(update);
            }

            function update() {
                const maxSpeed = 8.0; // увеличено для быстрых влетающих
                for (let i = elements.length - 1; i >= 0; i--) {
                    const el = elements[i];
                    el.x += el.vx;
                    el.y += el.vy;

                    if (el.isFlyingAway && el.y < -el.baseSize * 2) {
                        elements.splice(i, 1);
                        continue;
                    }

                    // Обычная обработка границ (только для не улетающих)
                    if (!el.isFlyingAway) {
                        if (el.x < 0) el.x = width;
                        if (el.x > width) el.x = 0;
                        if (el.y < 0) el.y = height;
                        if (el.y > height) el.y = 0;
                    }

                    // Хаотичные толчки (только для не улетающих)
                    if (!el.isFlyingAway && Math.random() < 0.008) {
                        el.vx += (Math.random() - 0.5) * 1.2;
                        el.vy += (Math.random() - 0.5) * 1.2;
                    }

                    // Ограничение скорости (для всех)
                    if (Math.abs(el.vx) > maxSpeed) el.vx = Math.sign(el.vx) * maxSpeed;
                    if (Math.abs(el.vy) > maxSpeed) el.vy = Math.sign(el.vy) * maxSpeed;
                }
                draw();
            }

            // ==================== ПРЕВРАЩЕНИЕ ====================
            function handleInteraction(e) {
                e.preventDefault();

                playPop();

                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;

                const mouseX = (clientX - rect.left) * scaleX;
                const mouseY = (clientY - rect.top) * scaleY;

                // Собираем все объекты в радиусе 150 пикселей
                const candidates = [];
                const searchRadius = 150;
                for (let i = 0; i < elements.length; i++) {
                    const el = elements[i];
                    if (el.isFlyingAway) continue;
                    const dx = mouseX - el.x;
                    const dy = mouseY - el.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < searchRadius) {
                        candidates.push(i);
                    }
                }

                if (candidates.length > 0 && skelImages.length > 0) {
                    // Случайный выбор среди подходящих
                    const randomIndex = candidates[Math.floor(Math.random() * candidates.length)];
                    const newEl = elements[randomIndex];
                    
                    const posX = newEl.x;
                    const posY = newEl.y;

                    const randomSkel = skelImages[Math.floor(Math.random() * skelImages.length)];
                    newEl.type = 'image';
                    newEl.img = randomSkel.img;
                    newEl.baseSize = randomSkel.baseSize * (0.8 + Math.random() * 0.6);
                    delete newEl.text;
                    delete newEl.color;
                    // Улёт
                    newEl.isFlyingAway = true;
                    newEl.vy = -25 - Math.random() * 10;
                    newEl.vx = (Math.random() - 0.5) * 3;
                    // Пульс
                    newEl.baseSize *= 1.6;
                    setTimeout(() => {
                        newEl.baseSize /= 1.6;
                    }, 150);

                    createParticles(posX, posY, 30);
                }
            }

            canvas.addEventListener('click', handleInteraction);
            canvas.addEventListener('touchstart', handleInteraction, { passive: false });
            canvas.addEventListener('contextmenu', (e) => e.preventDefault());

            // Новые элементы появляются каждые 4 секунды, но теперь они влетают снаружи
            setInterval(() => {
                if (elements.length < 80) { // немного увеличил лимит
                    const el = createRandomElement();
                    if (el) elements.push(el);
                }
            }, 4000);
        })();
    </script>
</body>
  </html>
